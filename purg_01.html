<!DOCTYPE html>
<html lang="uk" class="theme-purgatorio">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purg. I — Інтертекстуальне дерево</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="dante-theme.css">
</head>
<body>
<div class="side-panel-overlay" id="overlay" onclick="togglePanel()"></div>
<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="inf_34.html">← Inf. XXXIV</a>
    <div class="title-block"><h1>Purgatorio I</h1><p>Інтертекстуальне дерево джерел — Катон і берег Чистилища</p></div>
    <a class="nav-arrow" href="purg_02.html">Purg. II →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"p_1", to:"aen_vi_384", type:"STRUCTURE",
    dF:"Перші рядки Purgatorio оголошують зміну тональності — «навігаційна» метафора поезії як корабля, що виходить з жорстокого моря.",
    dT:"На початку шостої книги Aeneis Еней виходить з підземного світу і продовжує плавання. Данте моделює перехід від Inferno до Purgatorio за цією структурою." },
  { from:"p_7", to:"met_v", type:"ALLUSION",
    dF:"Данте описує сяйво Венери-ранкової зорі та сузір'я Риб — класичний астрономічний опис зорі.",
    dT:"В п'ятій книзі Metamorphoses Овідій описує зорю через астральні образи. Данте використовує подібний прийом для передачі часу доби." },
  { from:"p_13", to:"aen_viii", type:"ALLUSION",
    dF:"Чотири зорі, які бачить Данте, пов'язані з поетичною традицією описів зоряного неба під час плавання.",
    dT:"В Aeneis VIII Вергілій описує зоряне небо, яке бачить Еней під час нічного плавання Тибром. Чотири зорі Данте також перегукуються з «прямою» зорею Катона у Лукана." },
  { from:"p_31", to:"phars_ii", type:"ALLUSION",
    dF:"Катон постає як вартовий Чистилища з гідною бородою, осяяний чотирма зорями. Його моральний авторитет іде від Лукана.",
    dT:"У другій книзі Pharsalia Лукан малює Катона як зразок стоїчної доброчесності: він відмовляється від розкоші, бере шлюб лише заради обов'язку і стає моральним центром республіканської справи." },
  { from:"p_31", to:"aen_viii_670", type:"ONOMASTIC",
    dF:"Катон як символ республіканської чесноти — образ, відомий із кількох латинських джерел.",
    dT:"На щиті Енея в Aeneis VIII Вергілій зображує Катона серед праведних душ у Елізіумі — він дає закони блаженним." },
  { from:"p_71", to:"phars_ii_372", type:"INVERSION",
    dF:"Катон питає пілігримів, чи порушені закони Пекла — відлуння його ролі стоїчного суворого вартового. Але тут він охоронець надії, а не безнадії.",
    dT:"У Pharsalia Катон суворо веде армію через лівійську пустелю, відмовляючись від оракула. Данте інвертує контекст: замість пустелі — берег порятунку, замість війни — очищення." },
  { from:"p_94", to:"aen_vi_893", type:"STRUCTURE",
    dF:"Вергілій пояснює Катону, що прийшли з благословення небесної дами — структура «пропуску» через авторитет вищої сили.",
    dT:"В Aeneis VI Сивілла показує золоту гілку Харону як перепустку. Данте замінює магічний предмет на небесне заступництво, зберігаючи наративну модель." },
  { from:"p_115", to:"aen_vi_230", type:"ALLUSION",
    dF:"Катон наказує Вергілію оперезати Данте очеретом і вмити обличчя від слідів Пекла — ритуал очищення.",
    dT:"В Aeneis VI Еней зриває золоту гілку перед сходженням до Аїду. Данте трансформує золоту гілку на смиренну очеретину — символ покори замість магічної сили." },
  { from:"p_130", to:"met_i_416", type:"THEMATIC",
    dF:"Зірвана очеретина миттєво відростає — мотив чудесного відновлення рослини.",
    dT:"У першій книзі Metamorphoses Овідій описує відновлення природи після потопу. Мотив рослини, що чудесно відростає, є частиною ширшої овідіанської теми метаморфози та оновлення." },
  // Chains
  { from:"phars_ii", to:"cic_off", type:"THEMATIC",
    dF:"Лукан будує свого Катона на цицеронівській традиції Катона як ідеалу чесноти.",
    dT:"Цицерон у De Officiis неодноразово посилається на Катона як зразок стоїчної чесноти. Лукан літературно розгортає цей образ у Pharsalia." },
];

const NODES_RAW = {
  p_1:       { label:"I, 1–6",       sub:"корабель поезії",     author:"Данте",    col:0 },
  p_7:       { label:"I, 7–12",      sub:"Венера / зоря",       author:"Данте",    col:0 },
  p_13:      { label:"I, 13–27",     sub:"чотири зорі",         author:"Данте",    col:0 },
  p_31:      { label:"I, 31–39",     sub:"Катон",               author:"Данте",    col:0 },
  p_71:      { label:"I, 40–84",     sub:"допит Катона",        author:"Данте",    col:0 },
  p_94:      { label:"I, 85–108",    sub:"небесна заступниця",  author:"Данте",    col:0 },
  p_115:     { label:"I, 115–136",   sub:"очерет і омивання",   author:"Данте",    col:0 },
  p_130:     { label:"I, 134–136",   sub:"очерет відростає",    author:"Данте",    col:0 },
  phars_ii:  { label:"Phars. II, 234–391", sub:"Катон",         author:"Лукан",    col:1 },
  phars_ii_372:{label:"Phars. IX, 371–510",sub:"похід пустелею",author:"Лукан",    col:1 },
  aen_vi_384:{ label:"Aen. VI, 384–416",   sub:"вихід з Аїду",  author:"Вергілій", col:1 },
  aen_viii:  { label:"Aen. VIII, 86–96",    sub:"зоряне небо",   author:"Вергілій", col:1 },
  aen_viii_670:{label:"Aen. VIII, 670",     sub:"Катон на щиті", author:"Вергілій", col:1 },
  aen_vi_893:{ label:"Aen. VI, 405–410",    sub:"золота гілка / Харон", author:"Вергілій", col:1 },
  aen_vi_230:{ label:"Aen. VI, 136–148",    sub:"золота гілка",  author:"Вергілій", col:1 },
  met_v:     { label:"Met. V, 440–445",     sub:"зоря",          author:"Овідій",   col:1 },
  met_i_416: { label:"Met. I, 416–437",     sub:"оновлення",     author:"Овідій",   col:1 },
  cic_off:   { label:"De Off. I, 112",      sub:"Катон-ідеал",   author:"Цицерон", col:2 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281e14",s:"#d4a853"},  // gold
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},  // purple
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},  // magenta/pink
  "Лукан":    {f:"#0e2028",s:"#5abecc"},  // cyan
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},  // blue
  "Цицерон":  {f:"#1e280e",s:"#8ece5a"},  // lime green
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},  // orange
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"}   // red
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2]);
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);nodes.forEach(n=>{n.x=colX[n.col]});const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);const defs=svg.append("defs");Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id",`a-${t}`).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});const nCols=colX.length;const cw=svgW/nCols;colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return`M${sx},${s.y} C${sx+dx*.45},${s.y} ${tx-dx*.45},${t.y} ${tx},${t.y}`}
const linkG=svg.append("g");const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path").attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to])).attr("fill","none").attr("stroke",d=>TC[d.type]).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6).attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none").attr("opacity",.5).attr("marker-end",d=>`url(#a-${d.type})`);
const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g").attr("transform",d=>`translate(${d.x-nodeW/2},${d.y-nodeH/2})`).style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5).attr("fill",d=>AS[d.author]?.f||"#1a1a1a").attr("stroke",d=>AS[d.author]?.s||"#333").attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text').trim()).attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500).text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text-muted').trim()).attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic").text(d=>d.sub);
ne.filter(d=>d.col>0).append("text").attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle").attr("fill",d=>AS[d.author]?.s||"#555").attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7).text(d=>d.author);
ne.on("mouseover",function(ev,d){const ids=new Set([d.id]);LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04).attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});nodeG.selectAll("g").select("rect").attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
const html=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{const c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"→":"←";return`<span class="tt-type" style="background:${c}22;color:${c};border:1px solid ${c}44">${TYPE_UA[l.type]}</span> ${arr} <strong>${other.label}</strong><br><span class="tt-desc">${desc}</span>`}).join("<br><br>");
if(html)tooltip.html(`<strong>${d.label}</strong> <em style="color:var(--text-muted)">· ${d.author}</em><br><br>${html}`).style("opacity",1).style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")
}).on("mousemove",function(ev){tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")}).on("mouseout",function(){linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);nodeG.selectAll("g").select("rect").attr("opacity",1);tooltip.style("opacity",0)});
function togglePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}});
(function(){const r=n=>{const v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];let o='';for(let i=0;i<v.length;i++)while(n>=v[i]){o+=s[i];n-=v[i]}return o};const p=n=>String(n).padStart(2,'0');const ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];const cur='purg_01';let h='';ct.forEach(c=>{h+=`<div class="side-panel-section"><h3>${c.t}</h3>`;for(let i=1;i<=c.c;i++){const f=`${c.x}_${p(i)}`;h+=`<a href="${f}.html"${f===cur?' class="current"':''}>${c.a} ${r(i)}</a>`}h+='</div>'});document.getElementById('panelContent').innerHTML=h})();
</script>
</body>
</html>
