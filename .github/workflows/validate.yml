name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Validate JSON schema and semantics
        run: uv run scripts/validate_json.py

      - name: Render HTML
        run: uv run scripts/render_html.py

      - name: Check rendered output matches
        run: uv run scripts/render_html.py --check
