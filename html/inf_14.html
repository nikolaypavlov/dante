<body>

<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="inf_13.html">← Inf. XIII</a>
    <div class="title-block"><h1>Inferno XIV</h1><p>Інтертекстуальне дерево джерел</p></div>
    <a class="nav-arrow" href="inf_15.html">Inf. XV →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"phars_ix_371", type:"ALLUSION",
    dF:"Третє мале коло — пустельний пісок, на який падає вогняний дощ. Грішники лежать, сидять або блукають. Пустельний пейзаж із вогненними фалькатами нагадує Лівійську пустелю Лукана.",
    dT:"В Pharsalia IX армія Катона перетинає Лівійську пустелю: палючий пісок, вогняний вітер, отруйні змії. Лукан деталізує страждання від спеки і піску — модель безвідного пекельного простору." },
  { from:"d_02", to:"gen_19_24", type:"ALLUSION",
    dF:"На грішників падає повільний дощ із вогняних пластівців — «sovra tutto 'l sabbion, d'un cader lento, / piovean di foco dilatate falde». Пряма алюзія на знищення Содому.",
    dT:"В Книзі Буття Бог знищує Содом і Гоморру: «pluit Dominus super Sodomam et Gomorrham sulphur et ignem» (Gen. 19:24). Вогняний дощ як божественна кара за гріхи проти природи." },
  { from:"d_02", to:"phars_ix_445", type:"ALLUSION",
    dF:"Данте порівнює вогняний дощ із тим, що бачив Олександр Македонський в Індії — коли пластівці вогню падали на землю. Образність запозичена з лукaнівського пустельного пейзажу.",
    dT:"Лукан описує лівійську піщану бурю, де вітер здіймає пісок так, що він падає згори як дощ. Образ падаючих з неба частинок серед палючої пустелі — модель для Дантового вогняного дощу." },
  { from:"d_03", to:"theb_x_827", type:"ALLUSION",
    dF:"Капаней лежить під вогняним дощем, зневажливо кричачи: «Qual io fui vivo, tal son morto!» і «Se Giove stanchi il suo fabbro...» — він кидає виклик Юпітеру навіть у пеклі.",
    dT:"В Thebais X Капаней піднімається на стіни Фів і кричить: «Nunc age, nunc totis in me conitere flammis, / Iuppiter!» Юпітер вражає його блискавкою, і він падає зі стін." },
  { from:"d_03", to:"theb_iii_602", type:"THEMATIC",
    dF:"Капаней у Данте — архетип hybris: він не кається і не визнає божественної влади навіть у пеклі. Його гордість — не героїчна, а порожня, бо «la tua superbia è la tua pena».",
    dT:"В Thebais Стацій послідовно будує образ Капанея як нечестивця: він зневажає богів, жертвопринесення, пророцтва. Його hybris — наскрізна тема Thebais, що веде до неминучого покарання." },
  { from:"d_04", to:"aen_viii_416", type:"ALLUSION",
    dF:"Капаней кричить, що навіть якщо Юпітер утомить свого коваля Вулкана на Монджібелло (Етні), блискавки не зможуть його вразити. Алюзія на кузню циклопів під Етною.",
    dT:"В Aeneis VIII Вергілій описує підземну кузню Вулкана під Етною, де циклопи Бронтес, Стеропес і Піракмон кують блискавки для Юпітера. Етна як місце виготовлення божественної зброї." },
  { from:"d_05", to:"dan_2_31", type:"ALLUSION",
    dF:"Вергілій описує Старого з Крити — гігантську статую в горі Іда. Голова з золота, груди зі срібла, далі мідь, залізо, глина. Із тріщин течуть сльози, що формують ріки пекла.",
    dT:"В Книзі Даниїла (2:31–45) Навуходоносор бачить уві сні статую: голова із золота, груди зі срібла, живіт з міді, ноги із заліза та глини. Камінь руйнує статую. Даниїл тлумачить це як послідовність царств." },
  { from:"d_05", to:"met_i_89", type:"STRUCTURE",
    dF:"Послідовність металів у статуї (золото, срібло, мідь, залізо) відтворює овідіанську схему деградації людства від Золотого до Залізного віку. Данте поєднує біблійний і овідіанський образи.",
    dT:"В Metamorphoses I Овідій описує чотири віки: Золотий (Сатурн), Срібний (Юпітер), Мідний і Залізний. Кожен наступний вік гірший. Ця схема деградації стає основою для Дантової алегорії Старого з Крити." },
  { from:"d_06", to:"aen_vi_295", type:"STRUCTURE",
    dF:"Сльози Старого стікають і формують Ахерон, Стікс, Флегетон і Коцит — чотири ріки Дантового пекла. Данте пояснює єдине джерело всіх пекельних рік.",
    dT:"В Aeneis VI Вергілій називає ріки Аїду: Ахерон, Стікс, Флегетон, Коцит — але не пояснює їхнє походження. Данте створює етіологічний міф: усі ріки мають одне джерело — сльози людського гріха." },
  { from:"d_07", to:"aen_iii_104", type:"ALLUSION",
    dF:"Старий стоїть усередині гори Іда на Криті — місці, де, за міфом, виростав Юпітер. Данте розміщує джерело пекельних рік саме тут, на символічному перетині античної та біблійної традицій.",
    dT:"В Aeneis III Еней плавучи повз Крит, згадує гору Іду як місце, де куріти ховали немовля Юпітера від Сатурна, заглушуючи крик ударами в щити. Крит як місце народження вищої влади." },
  { from:"d_08", to:"dan_2_33", type:"ALLUSION",
    dF:"Статуя стоїть на правій нозі з обпаленої глини — найслабшій частині. Данте додає, що Старий спирається саме на неї, а не на ліву (залізну). Алегорія слабкості сучасної влади.",
    dT:"В Книзі Даниїла (2:33–34) ноги статуї частково залізні, частково глиняні. Камінь вдаряє саме в глиняну частину, руйнуючи всю статую. Глина = слабкість людської влади." },
  { from:"d_09", to:"phars_ix_509", type:"THEMATIC",
    dF:"Данте і Вергілій ідуть берегом потічка, що витікає з лісу самогубців через пустелю. Його кам'яні береги захищають від вогню. Потік серед пустелі — мотив оази.",
    dT:"В Pharsalia IX серед лівійської пустелі зустрічаються рідкісні джерела — часто отруйні. Мотив потоку серед небезпечного простору як шляху порятунку або пастки." },
];

const NODES_RAW = {
  d_01:    { label:"XIV, 13\u201315", sub:"lo spazzo — пустеля",      author:"Данте",    col:0 },
  d_02:    { label:"XIV, 28\u201336", sub:"вогняний дощ",             author:"Данте",    col:0 },
  d_03:    { label:"XIV, 46\u201372", sub:"Капаней",                  author:"Данте",    col:0 },
  d_04:    { label:"XIV, 52\u201357", sub:"Mongibello — кузня",       author:"Данте",    col:0 },
  d_05:    { label:"XIV, 94\u2013120",sub:"Gran Veglio — Старий",     author:"Данте",    col:0 },
  d_06:    { label:"XIV, 103\u2013111",sub:"ріки пекла",              author:"Данте",    col:0 },
  d_07:    { label:"XIV, 97\u201399", sub:"Крит — гора Іда",          author:"Данте",    col:0 },
  d_08:    { label:"XIV, 100\u2013102",sub:"глиняна нога",            author:"Данте",    col:0 },
  d_09:    { label:"XIV, 79\u201384", sub:"ruscelletto — потічок",    author:"Данте",    col:0 },
  phars_ix_371:{ label:"Phars. IX, 371\u2013410",sub:"Лівійська пустеля",author:"Лукан",  col:1 },
  phars_ix_445:{ label:"Phars. IX, 445\u2013492",sub:"піщана буря",     author:"Лукан",   col:1 },
  phars_ix_509:{ label:"Phars. IX, 509\u2013510",sub:"джерело в пустелі",author:"Лукан",  col:1 },
  gen_19_24:   { label:"Gen. 19:24\u201325",    sub:"дощ на Содом",     author:"Біблія",  col:1 },
  dan_2_31:    { label:"Dan. 2:31\u201345",     sub:"статуя зі сну",    author:"Біблія",  col:1 },
  dan_2_33:    { label:"Dan. 2:33\u201334",     sub:"глиняні ноги",     author:"Біблія",  col:1 },
  theb_x_827:  { label:"Theb. X, 827\u2013939", sub:"Капаней і Юпітер", author:"Стацій",  col:1 },
  theb_iii_602:{ label:"Theb. III, 602\u2013608",sub:"hybris Капанея",  author:"Стацій",  col:1 },
  aen_viii_416:{ label:"Aen. VIII, 416\u2013453",sub:"кузня Вулкана",   author:"Вергілій",col:1 },
  aen_vi_295:  { label:"Aen. VI, 295\u2013316", sub:"ріки Аїду",        author:"Вергілій",col:1 },
  aen_iii_104: { label:"Aen. III, 104\u2013106",sub:"Крит — Юпітер",    author:"Вергілій",col:1 },
  met_i_89:    { label:"Met. I, 89\u2013150",   sub:"чотири віки",       author:"Овідій",  col:1 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_14';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
