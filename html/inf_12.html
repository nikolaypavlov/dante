<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"met_xv_262", type:"THEMATIC",
    dF:"Данте описує обвал скелі на спуску до сьомого кола, подібний до зсуву в Альпах біля Тренто (Slavini di Marco). Хаотичний ландшафт як ознака потойбічного насильства.",
    dT:"В Metamorphoses XV Овідій описує, як землетруси й повені змінюють ландшафт: гори рушаться, ріки міняють русло. Мотив руйнованого природного простору як наслідку космічних потрясінь." },
  { from:"d_02", to:"met_viii_152", type:"ALLUSION",
    dF:"На краю обвалу лежить Мінотавр — «l'infamia di Creti, che fu concetta ne la falsa vacca». Данте називає його «ганьбою Криту», згадуючи зачаття від фальшивої корови.",
    dT:"В Metamorphoses VIII Овідій описує Мінотавра — напівбика-напівлюдину, нащадка Пасіфаї та бика, якого Мінос ув'язнив у Лабіринті Дедала. Він пожирав афінських юнаків, поки Тезей не вбив його." },
  { from:"d_02", to:"aen_vi_24", type:"ALLUSION",
    dF:"Мінотавр як стражник сьомого кола — напівлюдське чудовисько, породжене неприродним з'єднанням. Данте використовує його як символ насильства — тварина і людина водночас.",
    dT:"В Aeneis VI на воротах храму в Кумах зображено міф про Мінотавра: «Veneris monumenta nefandae, mixtum genus prolesque biformis Minotaurus». Вергілій фіксує цей образ як символ нечестивого союзу." },
  { from:"d_03", to:"met_viii_169", type:"ALLUSION",
    dF:"Вергілій кричить на Мінотавра: «може, ти думаєш, що тут герцог Афін, який убив тебе нагорі?» Пряма алюзія на міф про Тезея, що вбив Мінотавра за допомогою Аріадни.",
    dT:"В Metamorphoses VIII Тезей вбиває Мінотавра в Лабіринті й виходить за допомогою нитки Аріадни. Овідій описує цю подію стисло, зосереджуючись на подальшій долі Аріадни, покинутої на Наксосі." },
  { from:"d_04", to:"matt_27", type:"ALLUSION",
    dF:"Вергілій пояснює, що обвал стався під час землетрусу, коли Христос зійшов до пекла — «poco pria che venisse colui che la gran preda / levò a Dite». Руїна як фізичний слід Зішестя.",
    dT:"Євангеліє від Матвія описує, що в момент смерті Ісуса «завіса храму роздерлася надвоє... і земля затремтіла, і скелі розпалися» (Matt. 27:51). Землетрус став знаком космічної катастрофи." },
  { from:"d_05", to:"met_ii_630", type:"ONOMASTIC",
    dF:"Хірон стоїть на чолі кентаврів як їхній ватажок. Данте підкреслює його мудрість: Хірон задумливо розчісає бороду стрілою. Він був вихователем Ахіллеса.",
    dT:"В Metamorphoses Овідій неодноразово згадує Хірона як мудрого кентавра, вихователя героїв, обізнаного в медицині та мистецтвах. Він — виняток серед диких кентаврів, істота розумна й шляхетна." },
  { from:"d_06", to:"met_ix_101", type:"ALLUSION",
    dF:"Несс — кентавр, що стає провідником Данте через ріку крові. У житті він загинув від отруєної стріли Геракла, помстившись посмертно. Данте зауважує: «e fé di sé la vendetta elli stesso».",
    dT:"В Metamorphoses IX Овідій описує, як Несс намагається викрасти Деяніру, дружину Геракла, і гине від його стріли. Вмираючи, він віддає Деянірі отруєну кров'ю сорочку, що пізніше вб'є Геракла." },
  { from:"d_07", to:"met_xii_306", type:"ONOMASTIC",
    dF:"Хірон вказує на Фола як на одного з кентаврів-стражників. Фол і тисячі інших кентаврів утілюють стихійне насильство — ірраціональну жорстокість.",
    dT:"В Metamorphoses XII Овідій детально описує бійку кентаврів на весіллі Піритоя: п'яні кентаври нападають на лапітів, починається криваве побоїще. Це каноничний образ тваринного насильства." },
  { from:"d_08", to:"aen_vi_285", type:"ALLUSION",
    dF:"Кентаври патрулюють ріку крові (Флегетон), стріляючи в тих, хто намагається піднятися. Вони — стражники першого малого кола, що карає насильство проти ближнього.",
    dT:"В Aeneis VI Вергілій розміщує кентаврів серед монстрів при вході до Аїду: «Centauri in foribus stabulant» — вони стоять як варта. Данте перетворює цей декоративний мотив на функціональну роль стражників." },
  { from:"d_09", to:"aen_vi_550", type:"ALLUSION",
    dF:"Ріка кип'ячої крові, де варяться тирани та вбивці — «riviera del sangue in la qual bolle» — є Дантовою версією Флегетону. Данте замінює вогонь на кров.",
    dT:"В Aeneis VI Флегетон — одна з рік Аїду, вогняна ріка, що оточує Тартар: «Phlegethon torquens flammis sonantibus undas». У Данте вогняна ріка стає рікою крові — contrapasso для насильників." },
  { from:"d_05", to:"achil_i_104", type:"ALLUSION",
    dF:"Вергілій називає Хірона вихователем Ахіллеса — «e quel di mezzo, ch'al petto si mira, / è il gran Chiron, il qual nodrì Achille». Прямий зв'язок із традицією виховання героїв.",
    dT:"В Achilleis I Стацій детально описує, як Хірон виховує юного Ахілла в печері на горі Пеліон: навчає полюванню, музиці, медицині. Мудрий кентавр — замінник батька для героя." },
  { from:"d_10", to:"phars_i_30", type:"ONOMASTIC",
    dF:"Серед тиранів у ріці крові — Аттіла, «flagello in terra» (бич на землі). Данте поміщає його серед найжорстокіших правителів-насильників.",
    dT:"Лукан на початку Pharsalia описує Рим як жертву власних тиранів і воєначальників, що стали бичем для власного народу. Мотив правителя-руйнівника перегукується з образом Аттіли." },
  { from:"d_11", to:"aen_vi_621", type:"STRUCTURE",
    dF:"Данте називає Діонісія (Сіракузького), Еццеліно та Обіццо — тиранів, занурених у кип'ячу кров за насильство. Каталог покараних правителів за моделлю вергіліанського Тартару.",
    dT:"В Aeneis VI серед покараних у Тартарі — тирани, братовбивці, зрадники клієнтів. Вергілій подає їх списком, не індивідуалізуючи. Данте перетворює анонімний каталог на серію конкретних історичних портретів." },
  { from:"d_12", to:"aen_vi_609", type:"STRUCTURE",
    dF:"На мілководді ріки крові стоять звичайні вбивці й розбійники, занурені менше, ніж тирани. Градація покарання за ступенем кровопролиття — принцип contrapasso.",
    dT:"В Aeneis VI серед покараних — ті, хто «fraus innexa clienti» — зрадив довіру і здобув чуже нечесно. Принцип пропорційності покарання до злочину присутній у Вергілія, хоча менш систематично." },
];

const NODES_RAW = {
  d_01:    { label:"XII, 1\u201310",  sub:"ruina — обвал",           author:"Данте",    col:0 },
  d_02:    { label:"XII, 12\u201321", sub:"Мінотавр",                author:"Данте",    col:0 },
  d_03:    { label:"XII, 16\u201320", sub:"Тезей убив Мінотавра",    author:"Данте",    col:0 },
  d_04:    { label:"XII, 34\u201339", sub:"землетрус при Розп'ятті", author:"Данте",    col:0 },
  d_05:    { label:"XII, 56\u201371", sub:"Хірон",                   author:"Данте",    col:0 },
  d_06:    { label:"XII, 65",        sub:"Несс",                     author:"Данте",    col:0 },
  d_07:    { label:"XII, 67\u201369", sub:"Фол",                     author:"Данте",    col:0 },
  d_08:    { label:"XII, 56\u201372", sub:"кентаври-стражники",      author:"Данте",    col:0 },

  met_xv_262:  { label:"Met. XV, 262\u2013267",sub:"руйнування ландшафту",author:"Овідій",col:1 },
  met_viii_152:{ label:"Met. VIII, 152\u2013182",sub:"Мінотавр",         author:"Овідій",  col:1 },
  met_viii_169:{ label:"Met. VIII, 169\u2013176",sub:"Тезей і Аріадна",  author:"Овідій",  col:1 },

  met_ix_101:  { label:"Met. IX, 101\u2013133", sub:"Несс і Деяніра",   author:"Овідій",  col:1 },
  met_xii_306: { label:"Met. XII, 306\u2013392",sub:"кентаври і лапіти", author:"Овідій",  col:1 },
  aen_vi_24:   { label:"Aen. VI, 24\u201326",   sub:"Мінотавр у Кумах", author:"Вергілій",col:1 },
  aen_vi_285:  { label:"Aen. VI, 285\u2013289", sub:"кентаври в Аїді",  author:"Вергілій",col:1 },
  aen_vi_550:  { label:"Aen. VI, 550\u2013551", sub:"Phlegethon",       author:"Вергілій",col:1 },

  aen_vi_609:  { label:"Aen. VI, 609\u2013611", sub:"покарані за грабунок",author:"Вергілій",col:1 },
  achil_i_104: { label:"Achil. I, 104\u2013197",sub:"Хірон і Ахілл",    author:"Стацій",  col:1 },
  matt_27:     { label:"Matt. 27:51",           sub:"землетрус",         author:"Біблія",  col:1 },
  phars_i_30:  { label:"Phars. I, 30\u201332",  sub:"тирани-бичі",      author:"Лукан",   col:1 },

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_12';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
</body>
