<body>

    <div class="title-block"><h1>Purgatorio XXX</h1><p>Інтертекстуальне дерево джерел — Прихід Беатріче, зникнення Вергілія</p></div>

<div class="legend">

  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>

</div>

<script>
const TYPE_UA={ALLUSION:"Алюзія",STRUCTURE:"Структура",THEMATIC:"Тематика",INVERSION:"Інверсія",ONOMASTIC:"Ономастика"};
const LINKS_DATA=[
  {from:"d_01",to:"cant_4",type:"ALLUSION",dF:"Один зі старців тричі вигукує «Veni, sponsa, de Libano» — літургійний заклик, що вітає появу Беатріче як містичну наречену.",dT:"Пісня Пісень 4:8: наречений кличе наречену з Лівану — «veni de Libano, sponsa mea, veni de Libano, veni». В екзегезі — заклик Христа до душі."},
  {from:"d_02",to:"aen_vi_883",type:"ALLUSION",dF:"Янголи кидають квіти й цитують Вергілія: «Manibus, oh, date lilia plenis» — пряме латинське запозичення з Aeneis в устах небесних істот.",dT:"В Aeneis VI Анхіз оплакує передчасну смерть Марцелла і просить кидати лілії — «manibus date lilia plenis» (Aen. VI, 883). Жалобний контекст: квіти на могилу юнака."},
  {from:"d_03",to:"mt_21",type:"ALLUSION",dF:"Янголи вітають Беатріче словами «Benedictus qui venis» — із чоловічою формою, що натякає на христологічний статус Беатріче.",dT:"Євангеліє від Матвія 21:9: натовп зустрічає Ісуса криками «Benedictus qui venit in nomine Domini; Hosanna in excelsis». Літургійний гімн входу."},
  {from:"d_04",to:"georg_iv_490",type:"INVERSION",dF:"Данте обертається — і Вергілія вже немає. Інверсія: Орфей озирається і через це втрачає; Данте озирається і виявляє, що втрата вже відбулася.",dT:"В Georgica IV Орфей порушує заборону і озирається — «respexit» (Georg. IV, 491). Евридіка зникає. Акт погляду спричиняє втрату."},
  {from:"d_05",to:"georg_iv_525",type:"ALLUSION",dF:"Данте тричі повторює «Virgilio» в плачі за зниклим провідником — потрійна анафора імені як ритуал прощання.",dT:"В Georgica IV голова Орфея повторює ім'я Евридіки: «Eurydicen vox ipsa et frigida lingua... vocabat: Eurydicen toto referebant flumine ripae» (Georg. IV, 525–527). Потрійне ім'я як невтоленна туга."},
  {from:"d_06",to:"aen_i_148",type:"STRUCTURE",dF:"Беатріче стоїть із суворістю адмірала — «regalmente ne l'atto ancor proterva». Порівняння з командувачем флоту в момент владного контролю.",dT:"В Aeneis I Нептун владно вгамовує бурю — «quos ego!» Порівняння Нептуна з оратором, що вгамовує натовп (Aen. I, 148–153), задає модель владної постаті."},
  {from:"d_07",to:"ps_30",type:"ALLUSION",dF:"Янголи співають «In te, Domine, speravi» — псалом надії посеред докору Беатріче, ніби заступаючись за Данте.",dT:"Псалом 30 (31): «In te, Domine, speravi; non confundar in aeternum» — «На Тебе, Господи, уповаю». Псалом довіри в момент випробування."},
];
const NODES_RAW={
  d_01:{label:"XXX, 11\u201312",sub:"Veni, sponsa",author:"Данте",col:0},
  d_02:{label:"XXX, 19\u201321",sub:"date lilia plenis",author:"Данте",col:0},
  d_03:{label:"XXX, 19",sub:"Benedictus qui venis",author:"Данте",col:0},
  d_04:{label:"XXX, 46\u201348",sub:"зникнення Вергілія",author:"Данте",col:0},
  d_05:{label:"XXX, 49\u201351",sub:"Virgilio \u00d73",author:"Данте",col:0},
  d_06:{label:"XXX, 76\u201378",sub:"суворий адмірал",author:"Данте",col:0},
  d_07:{label:"XXX, 83\u201384",sub:"In te, Domine",author:"Данте",col:0},
  cant_4:{label:"Cant. 4:8",sub:"sponsa de Libano",author:"Біблія",col:1},
  aen_vi_883:{label:"Aen. VI, 883",sub:"date lilia plenis",author:"Вергілій",col:1},
  mt_21:{label:"Mt. 21:9",sub:"Benedictus qui venit",author:"Біблія",col:1},
  georg_iv_490:{label:"Georg. IV, 490\u2013498",sub:"Orpheus respexit",author:"Вергілій",col:1},
  georg_iv_525:{label:"Georg. IV, 525\u2013527",sub:"Eurydicen \u00d73",author:"Вергілій",col:1},
  aen_i_148:{label:"Aen. I, 148\u2013153",sub:"Нептун і буря",author:"Вергілій",col:1},
  ps_30:{label:"Ps. 30:2",sub:"In te speravi",author:"Біблія",col:1},
};
const AUTHOR_STYLES={"Данте":{f:"#281e14",s:"#d4a853"},"Вергілій":{f:"#1a0e28",s:"#a06ece"},"Овідій":{f:"#280e1a",s:"#ce5a8a"},"Стацій":{f:"#0e1428",s:"#5a78ce"},"Біблія":{f:"#280e0e",s:"#ce5a5a"}};
const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id",`a-${t}`).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});
function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return`M${sx},${s.y} C${sx+dx*.45},${s.y} ${tx-dx*.45},${t.y} ${tx},${t.y}`}
const linkG=svg.append("g");const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path").attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to])).attr("fill","none").attr("stroke",d=>TC[d.type]).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6).attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none").attr("opacity",.5).attr("marker-end",d=>`url(#a-${d.type})`);
const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g").attr("transform",d=>`translate(${d.x-nodeW/2},${d.y-nodeH/2})`).style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5).attr("fill",d=>AS[d.author]?.f||"#1a1a1a").attr("stroke",d=>AS[d.author]?.s||"#333").attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text').trim()).attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500).text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text-muted').trim()).attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic").text(d=>d.sub);
ne.filter(d=>d.col>0).append("text").attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle").attr("fill",d=>AS[d.author]?.s||"#555").attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7).text(d=>d.author);
ne.on("mouseover",function(ev,d){const ids=new Set([d.id]);LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04).attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});nodeG.selectAll("g").select("rect").attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";return '<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>'}).join("<br><br>");
if(parts)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+parts).style("opacity",1).style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")}).on("mouseout",function(){linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);nodeG.selectAll("g").select("rect").attr("opacity",1);tooltip.style("opacity",0)});
function togglePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}});
(function(){var r=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],o='';for(var i=0;i<v.length;i++)while(n>=v[i]){o+=s[i];n-=v[i]}return o};var p=function(n){return String(n).padStart(2,'0')};var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];var cur='purg_30';var container=document.getElementById('panelContent');ct.forEach(function(c){var sec=document.createElement('div');sec.className='side-panel-section';var h3=document.createElement('h3');h3.textContent=c.t;sec.appendChild(h3);for(var i=1;i<=c.c;i++){var f=c.x+'_'+p(i);var a=document.createElement('a');a.href=f+'.html';a.textContent=c.a+' '+r(i);if(f===cur)a.className='current';sec.appendChild(a)}container.appendChild(sec)})})();
</script>
