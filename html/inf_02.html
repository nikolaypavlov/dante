<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"aen_ii_250", type:"ALLUSION",
    dF:"Данте відкриває пісню описом вечора: день відходить, смеркання знімає тягар праці з усіх живих істот. Формула заходу сонця як переходу до нового етапу дії.",
    dT:"В Aeneis II Вергілій описує настання ночі перед падінням Трої: «vertitur interea caelum et ruit Oceano nox» — небо обертається, ніч звалюється з океану. Топос вечірнього переходу як прелюдія до подій." },
  { from:"d_02", to:"aen_vi_260", type:"STRUCTURE",
    dF:"Данте готується до подорожі «io sol uno» — один із усіх живих. Формула самотнього героя, що протистоїть потойбіччю, побудована за моделлю вергіліанського catabasis.",
    dT:"В Aeneis VI, перед входом до Аїду, Сивілла звертається до Енея, і він мусить зібрати мужність для сходження в самотності. Модель одинокого живого серед мертвих." },
  { from:"d_03", to:"aen_vi_264", type:"ALLUSION",
    dF:"Данте звертається до Муз і до свого «високого генія» перед початком розповіді — класична інвокація. Подвійне звернення (до Муз і до власної пам'яті) перегукується з вергіліанською формулою.",
    dT:"На порозі Аїду Вергілій вигукує: «di, quibus imperium est animarum, umbrae silentes» — звернення до божеств підземного світу. Ритуальна інвокація перед catabasis." },
  { from:"d_04", to:"aen_vii_641", type:"ALLUSION",
    dF:"Данте звертається до пам'яті, що записала побачене — «o mente che scrivesti ciò ch'io vidi». Пам'ять як божественна сила, що фіксує досвід поета.",
    dT:"В Aeneis VII, перед каталогом воїнів, Вергілій звертається до Муз: «et meministis enim, divae, et memorare potestis» — ви пам'ятаєте і можете переказати. Музи як носії пам'яті." },
  { from:"d_05", to:"aen_vi_679", type:"ALLUSION",
    dF:"Данте прямо називає Енея — «Silvio parente» — і його сходження до Аїду «in carne» як прецедент подорожі живого у потойбіччя. Він визнає божественну мету цієї подорожі.",
    dT:"В шостій книзі Aeneis Еней сходить у підземний світ, де Анхіз показує йому майбутніх нащадків і долю Рима. Catabasis має провіденційну мету: показати герою його місію заснування Рима." },
  { from:"d_06", to:"aen_vi_847", type:"ALLUSION",
    dF:"Данте стверджує, що потойбічна подорож Енея мала на меті заснування Рима як «святого місця, де сидить наступник великого Петра». Подвійна легітимація — імперська і папська.",
    dT:"В кульмінації Аїду Анхіз звертається до майбутніх римлян: «tu regere imperio populos, Romane, memento» — пророцтво про Рим як світову державу, що править народами." },
  { from:"d_07", to:"cor2_12", type:"ALLUSION",
    dF:"Данте згадує апостола Павла як другий прецедент подорожі у потойбіччя: «Vas d'elezione» — «посудина обрання», як його називає Біблія.",
    dT:"У Другому посланні до коринтян Павло описує своє вознесіння до третього неба: «scio hominem in Christo ante annos quattuordecim, raptum usque ad tertium caelum». Він чув невимовні слова." },
  { from:"d_07", to:"act_9", type:"ALLUSION",
    dF:"Данте називає Павла «Vas d'elezione» — прямий переклад біблійного виразу, яким Христос означує Павла у розмові з Ананієм.",
    dT:"В Actus Apostolorum Господь каже Ананії про Савла: «vas electionis est mihi iste, ut portet nomen meum coram gentibus» — «він є посудина обрання для мене, щоб нести моє ім'я перед народами»." },
  { from:"d_08", to:"aen_vi_122", type:"STRUCTURE",
    dF:"Данте вагається: він не Еней і не Павло — чому саме він гідний потойбічної подорожі? Момент сумніву героя перед catabasis.",
    dT:"В Aeneis VI Сивілла перелічує прецеденти catabasis (Орфей, Тесей, Геракл), щоб переконати Енея. Модель: герой сумнівається, потім отримує легітимацію через прецеденти." },
  { from:"d_09", to:"aen_iv_437", type:"THEMATIC",
    dF:"Данте описує свій стан коливання: той, хто хоче і не хоче, змінює рішення під натиском думок, і зупиняється, відмовившись від початого. Психологія нерішучості.",
    dT:"В Aeneis IV Еней вагається під тиском обов'язку і почуттів до Дідони. Вергілій неодноразово моделює внутрішній конфлікт героя між поривом і волею. Топос «нерішучості героя» є наскрізним." },
  { from:"d_10", to:"aen_i_227", type:"STRUCTURE",
    dF:"Вергілій описує ланцюжок небесного заступництва: «donna gentile» на небі зглянулася на Данте. Троїста жіноча інтервенція (Марія \u2192 Лючія \u2192 Беатріче) аналогічна небесному заступництву в Aeneis.",
    dT:"В Aeneis I Венера благає Юпітера за свого сина Енея, потерпілого від бурі Юнони. Модель: небесна заступниця звертається до вищої сили заради героя." },
  { from:"d_11", to:"aen_vi_440", type:"INVERSION",
    dF:"Беатріче спускається в Лімб до Вергілія: жива блаженна душа сходить до нижнього світу, щоб урятувати свого protégé. Вона не страждає і не боїться.",
    dT:"В Aeneis VI Еней зустрічає Дідону в Lugentes campi — полях скорботних. Вона відвертається від нього. Данте інвертує сцену: Беатріче приходить добровільно, сповнена любові, а не мовчазного гніву." },
  { from:"d_12", to:"aen_i_327", type:"STRUCTURE",
    dF:"Беатріче представляється Вергілію — «I' son Beatrice che ti faccio andare» — і пояснює свою місію. Модель божественної посланниці, що відкриває свою ідентичність і мету.",
    dT:"В Aeneis I Венера з'являється Енею в образі мисливиці, а потім відкриває свою божественну природу. Модель: жіноче божество розкриває себе герою і спрямовує його дії." },
  { from:"d_13", to:"lael_v", type:"THEMATIC",
    dF:"Беатріче називає Данте «l'amico mio, e non de la ventura» — «мій друг, а не долі». Розрізнення справжньої дружби від дружби за обставинами.",
    dT:"У трактаті Цицерона De Amicitia (Laelius) розрізняється справжня дружба, що ґрунтується на чесноті (verus amicus), і дружба з корисливих мотивів. Це розрізнення було усталеним у середньовічній етиці." },
  { from:"d_14", to:"aen_vi_883", type:"THEMATIC",
    dF:"Данте порівнює своє відродження після страху з квітками, що розкриваються на світанку: «quali fioretti dal notturno gelo / chinati e chiusi, poi che 'l sol li 'mbianca, / si drizzan tutti aperti in loro stelo».",
    dT:"В Aeneis Вергілій неодноразово використовує квіткову образність як символ відродження і надії. Мотив квітки, що розкривається, є топосом переходу від скорботи до рішучості." },
  { from:"d_15", to:"aen_i_151", type:"THEMATIC",
    dF:"Беатріче просить Вергілія вжити свою «parola ornata» — прикрашене слово, риторичне мистецтво, яке може врятувати Данте. Красномовність як інструмент порятунку.",
    dT:"В Aeneis Вергілій моделює владу слова: Нептун вгамовує буржне море промовою. Оратор, що силою мови змиряє хаос — ключовий вергіліанський топос." },
];

const NODES_RAW = {
  d_01:    { label:"II, 1\u20136",    sub:"Lo giorno se n'andava",  author:"Данте",    col:0 },
  d_02:    { label:"II, 3\u20136",    sub:"io sol uno",             author:"Данте",    col:0 },
  d_03:    { label:"II, 7\u20139",    sub:"o Muse, o alto ingegno", author:"Данте",    col:0 },
  d_04:    { label:"II, 10\u201312",  sub:"o mente che scrivesti",  author:"Данте",    col:0 },
  d_05:    { label:"II, 13\u201327",  sub:"Silvio parente",         author:"Данте",    col:0 },

  d_10:    { label:"II, 52\u201357",  sub:"donna gentile",          author:"Данте",    col:0 },

  d_14:    { label:"II, 127\u2013132",sub:"fioretti",               author:"Данте",    col:0 },

  aen_iv_437:  { label:"Aen. IV, 437\u2013449", sub:"вагання Енея",         author:"Вергілій", col:1 },
  aen_i_227:   { label:"Aen. I, 227\u2013230",  sub:"Венера і Юпітер",      author:"Вергілій", col:1 },
  aen_vi_440:  { label:"Aen. VI, 440\u2013476", sub:"Lugentes campi",       author:"Вергілій", col:1 },
  aen_i_327:   { label:"Aen. I, 327\u2013328",  sub:"Венера з'являється",   author:"Вергілій", col:1 },
  aen_vi_883:  { label:"Aen. VI, 883\u2013886", sub:"квіткова образність",  author:"Вергілій", col:1 },
  aen_i_151:   { label:"Aen. I, 151\u2013156",  sub:"влада слова",          author:"Вергілій", col:1 },
  cor2_12:     { label:"2 Cor. 12:2\u20134",     sub:"raptus ad paradisum",  author:"Біблія",   col:1 },
  act_9:       { label:"Act. 9:15",              sub:"vas electionis",       author:"Біблія",   col:1 },

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"},
  "Цицерон":  {f:"#1a2808",s:"#8ece5a"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_02';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
