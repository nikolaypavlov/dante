<!DOCTYPE html>

</head>
<body>

<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>

  <div class="header-center">

    <div class="title-block"><h1>Inferno XXVII</h1><p>Інтертекстуальне дерево джерел</p></div>
    <a class="nav-arrow" href="inf_28.html">Inf. XXVIII →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"ars_poetica_460_466", type:"ALLUSION",
    dF:"Вогонь-в\'язень говорить так, як мідний бик сицилійського тирана Фаларіда: голос жертви, що горить усередині, виходить спотвореним, бо проходить крізь мідні стінки.",
    dT:"Горацій згадує мідного бика Фаларіда, тирана Акраґанту: Перілл збудував мідного бика для страти, але першим був засмажений у ньому сам. Крики жертви звучали як рев бика." },
  { from:"d_02", to:"ars_am_i_653_656", type:"ALLUSION",
    dF:"Данте зазначає, що першу долю мав Перілл, творець бика — «giustamente» — і це справедливо, бо він сам був першою жертвою свого знаряддя катування.",
    dT:"Овідій у Ars Amatoria I згадує Перілла і справедливість його покарання: «iustum et dignum fuit» — той, хто створив знаряддя катування, першим його зазнав." },
  { from:"d_03", to:"aen_iii_22_46", type:"STRUCTURE",
    dF:"Вогняний дух Ґвідо починає промову звертанням до Данте, просячи новин з Романьї. Структура діалогу з душею, що говорить із укриття (вогню), нагадує зустрічі в Аїді.",
    dT:"В Aeneis III Еней зустрічає Полідора, чий голос лунає з-під землі, коли Еней зламує гілку. Душа, замкнена у незвичній формі, звертається до подорожнього з проханням." },
  { from:"d_04", to:"aen_xi_340_365", type:"THEMATIC",
    dF:"Ґвідо каже: «l\'opere mie non furon leonine, ma di volpe» — мої дії були не левові, а лисячі. Він був майстром хитрощів, що перемагав «accorgimento» — розсудливістю, а не силою.",
    dT:"В Aeneis XI Дранс протиставляє хитрість і дипломатію прямому бою Турна. Мотив полководця, що обирає fortuna мілітарну через хитрість, а не відкриту битву." },
  { from:"d_05", to:"aen_ii_431_434", type:"THEMATIC",
    dF:"Ґвідо розповідає, що постригся у францисканці, сподіваючись спасіння: «credendomi, sì cinto, fare ammenda». Монаша ряса як маска для колишнього шахрая — зовнішнє благочестя.",
    dT:"В Aeneis II троянці одягають обладунки вбитих греків — зовнішня форма не відповідає внутрішній сутності. Мотив обманливого переодягання, що не змінює справжню натуру." },
  { from:"d_06", to:"mt_16_18_19", type:"INVERSION",
    dF:"Боніфацій VIII маніпулює Ґвідо: «le chiavi del cielo io tengo» — я тримаю небесні ключі, тож можу заздалегідь відпустити гріх. Папа перевертає священну владу в знаряддя корупції.",
    dT:"Христос передає Петру ключі Царства Небесного: «tibi dabo claves regni caelorum» — влада зв\'язувати й розв\'язувати гріхи. Данте показує інверсію: ключі використано для спокуси до гріха, а не для відпущення." },
  { from:"d_07", to:"phars_i_120_157", type:"THEMATIC",
    dF:"Боніфацій описаний як «lo principe d\'i novi Farisei» — князь нових фарисеїв, що веде війну не з сарацинами чи юдеями, а з християнами біля Латерану. Мотив правителя, що зраджує свій обов\'язок.",
    dT:"У Pharsalia I Лукан описує Цезаря, що розв\'язує громадянську війну замість зовнішньої — римлянин проти римлянина. Мотив правителя, який обертає зброю проти своїх замість ворогів." },
  { from:"d_08", to:"lc_16_22", type:"INVERSION",
    dF:"Після смерті Ґвідо чорний херувим забирає його душу замість Франциска: «Non portar: non mi far torto!» — не забирай, не чини мені кривди! Демон логічно доводить, що відпущення без каяття недійсне.",
    dT:"У притчі про багатія і Лазаря ангели несуть душу Лазаря на лоно Авраамове. Данте інвертує мотив: замість ангелів, що несуть душу до раю, чорний херувим тягне її до пекла." },
  { from:"d_09", to:"sat_ii_3", type:"THEMATIC",
    dF:"Демон виголошує силогізм: «ch\'assolver non si può chi non si pente, / né pentere e volere insieme puossi» — не можна відпустити того, хто не кається, а каятися й водночас хотіти гріха — суперечність.",
    dT:"Ювенал у сатирах викриває тих, хто вдає каяття, але продовжує грішити. Мотив хибного каяття як моральної суперечності — усталений сатиричний топос." },
];

const NODES_RAW = {
  "d_01": { label:"XXVII, 7–12", sub:"бик Фаларіда — голос із вогню", author:"Данте", col:0 },
  "ars_poetica_460_466": { label:"Ars Poetica, 460–466", sub:"мідний бик Фаларіда", author:"Горацій", col:1 },
  "d_02": { label:"XXVII, 7–12", sub:"Перілл — першу долю мав", author:"Данте", col:0 },
  "ars_am_i_653_656": { label:"Ars Am. I, 653–656", sub:"Перілл засмажений у власному витвор", author:"Овідій", col:1 },
  "d_03": { label:"XXVII, 19–21", sub:"Romagnuoli — «O tu a cu\' io driccio", author:"Данте", col:0 },
  "aen_iii_22_46": { label:"Aen. III, 22–46", sub:"Полідор — голос із-під землі", author:"Вергілій", col:1 },
  "d_04": { label:"XXVII, 67–78", sub:"Ґвідо — лев і лисиця", author:"Данте", col:0 },
  "aen_xi_340_365": { label:"Aen. XI, 340–365", sub:"Дранс — хитрість проти сили", author:"Вергілій", col:1 },
  "d_05": { label:"XXVII, 85–93", sub:"Ґвідо — францисканець", author:"Данте", col:0 },
  "aen_ii_431_434": { label:"Aen. II, 431–434", sub:"троянці переодягаються в грецьке", author:"Вергілій", col:1 },
  "d_06": { label:"XXVII, 94–111", sub:"спокуса Боніфація VIII", author:"Данте", col:0 },
  "mt_16_18_19": { label:"Mt. 16:18–19", sub:"ключі Петрові", author:"Біблія", col:1 },
  "d_07": { label:"XXVII, 100–105", sub:"il gran prete — Боніфацій", author:"Данте", col:0 },
  "phars_i_120_157": { label:"Phars. I, 120–157", sub:"Цезар і корупція влади", author:"Лукан", col:1 },
  "d_08": { label:"XXVII, 112–120", sub:"чорний херувим забирає душу", author:"Данте", col:0 },
  "lc_16_22": { label:"Lc. 16:22", sub:"душу Лазаря несуть ангели", author:"Біблія", col:1 },
  "d_09": { label:"XXVII, 118–120", sub:"логіка демона — волити і каятись", author:"Данте", col:0 },
  "sat_ii_3": { label:"Sat. II, 3", sub:"суперечність гріха й каяття", author:"Ювенал", col:1 },
};

const AUTHOR_STYLES = {
  "Біблія": {f:"#280e0e",s:"#ce5a5a"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Горацій": {f:"#1a2808",s:"#8ece5a"},
  "Данте": {f:"#281a08",s:"#d4a853"},
  "Лукан": {f:"#0e2028",s:"#5abecc"},
  "Овідій": {f:"#280e1a",s:"#ce5a8a"},
  "Ювенал": {f:"#1e2810",s:"#9ece5a"},
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);const defs=svg.append("defs");Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});const nCols=colX.length;const cw=svgW/nCols;colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});
function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path").attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to])).attr("fill","none").attr("stroke",d=>TC[d.type]).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6).attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none").attr("opacity",.5).attr("marker-end",d=>"url(#a-"+d.type+")");
const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g").attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")").style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5).attr("fill",d=>AS[d.author]?.f||"#1a1a1a").attr("stroke",d=>AS[d.author]?.s||"#333").attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text').trim()).attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500).text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text-muted').trim()).attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic").text(d=>d.sub);
ne.filter(d=>d.col>0).append("text").attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle").attr("fill",d=>AS[d.author]?.s||"#555").attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7).text(d=>d.author);
ne.on("mouseover",function(ev,d){const ids=new Set([d.id]);LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04).attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});nodeG.selectAll("g").select("rect").attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";return'<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>'}).join("<br><br>");
if(parts)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+parts).style("opacity",1).style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")
}).on("mousemove",function(ev){tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")}).on("mouseout",function(){linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);nodeG.selectAll("g").select("rect").attr("opacity",1);tooltip.style("opacity",0)});
function togglePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}});
(function buildNav(){var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};var pad2=function(n){return String(n).padStart(2,'0')};var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];var cur='inf_27';var container=document.getElementById('panelContent');ct.forEach(function(c){var sec=document.createElement('div');sec.className='side-panel-section';var h3=document.createElement('h3');h3.textContent=c.t;sec.appendChild(h3);for(var i=1;i<=c.c;i++){var f=c.x+'_'+pad2(i);var a=document.createElement('a');a.href=f+'.html';a.textContent=c.a+' '+roman(i);if(f===cur)a.className='current';sec.appendChild(a)}container.appendChild(sec)})})(  );
</script>
</body>
