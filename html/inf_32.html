<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inf. XXXII — Інтертекстуальне дерево</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="../dante-theme.css">
</head>
<body>
<div class="side-panel-overlay" id="overlay" onclick="togglePanel()"></div>
<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="inf_31.html">← Inf. XXXI</a>
    <div class="title-block"><h1>Inferno XXXII</h1><p>Інтертекстуальне дерево джерел</p></div>
    <a class="nav-arrow" href="inf_33.html">Inf. XXXIII →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"aen_vi_264", type:"STRUCTURE",
    dF:"Данте відкриває пісню інвокацією, благаючи про рими «aspre e chiocce» (грубі й хрипкі), гідні найнижчого місця пекла. Він каже, що описати дно всесвіту — не забавка для дитячої мови.",
    dT:"В Aeneis VI перед спуском у підземний світ Вергілій звертається до божеств Аїду: «Di, quibus imperium est animarum... sit mihi fas audita loqui» — інвокація до потойбічних сил. Модель урочистої інвокації перед catabasis." },
  { from:"d_02", to:"met_vi_178", type:"ALLUSION",
    dF:"Данте кличе Муз, що допомогли Амфіону обмурувати Фіви: «quelle donne aiutino il mio verso / ch'aiutaro Anf\u00efone a chiuder Tebe». Поезія як сила, що будує стіни.",
    dT:"Овідій згадує Амфіона, який грою на лірі, дарованій Гермесом, зводив кам'яні стіни Фів: каміння само складалось у мурівку від звуків музики. Класичний образ творчої сили поезії." },
  { from:"d_03", to:"aen_vi_323", type:"INVERSION",
    dF:"Данте зображує Коціт як замерзле озеро, в якому зрадники вмерзли по шию. Коціт виглядає як скло, не як вода — абсолютний холод замість вергіліанської рідкої ріки.",
    dT:"В Aeneis VI Коціт — одна з п'яти підземних рік, «болотиста вода Стиксу». У Вергілія підземні води рідкі й темні. Данте інвертує: його Коціт — крига, нерухомість, відсутність усякого руху і тепла." },
  { from:"d_04", to:"phars_iii_300", type:"THEMATIC",
    dF:"Данте порівнює крижане озеро: навіть якби гори Тамберніч і П'єтрап'яна впали на нього, лід не тріснув би навіть з краю. Гіпербола незламності через порівняння з горами.",
    dT:"Лукан у Pharsalia використовує географічні гіперболи, порівнюючи масштаби з горами та цілими регіонами. Жанрова традиція епічної гіперболи, де гори стають одиницею виміру монструозності." },
  { from:"d_05", to:"gen_4", type:"ONOMASTIC",
    dF:"Перша зона Коціту названа Каїною — на честь Каїна, першого братовбивці. Тут покарані зрадники родичів: вони вмерзлі в лід із похиленими головами.",
    dT:"В Genesis 4 Каїн вбиває брата Авеля з заздрощів і стає першим вбивцею в біблійній історії. Бог проклинає його — «maledictus eris super terram» — і він стає блукальцем. Каїн — архетип зрадника кровних зв'язків." },
  { from:"d_06", to:"theb_i_123", type:"THEMATIC",
    dF:"У Каїні Данте зустрічає братів Алессандро та Наполеоне дельї Альберті, що вбили один одного. Одна з тіней називає їх «найгідніших Каїни». Братовбивство як повторення архетипу.",
    dT:"В Thebais I Стацій описує ворожнечу Етеокла і Полініка, синів Едіпа, що домовились правити Фівами по черзі, але Етеокл відмовився віддати владу. Їхня взаємна ненависть закінчилась взаємним убивством — класичний архетип братовбивчої ворожнечі." },
  { from:"d_07", to:"aen_i_242", type:"ONOMASTIC",
    dF:"Друга зона Коціту названа Антенорою — на честь троянця Антенора, якого середньовічна традиція вважала зрадником, що видав Палладій грекам. Тут покарані зрадники батьківщини та партії.",
    dT:"В Aeneis I Вергілій згадує Антенора як троянця, що проникнув в Іллірію і заснував Падую. У Вергілія Антенор — позитивний персонаж, але середньовічні коментатори (через Дарета і Діктіса) вважали його зрадником Трої." },
  { from:"d_08", to:"roland_178", type:"ONOMASTIC",
    dF:"Боккаде Аббаті називає зрадників, серед яких — Ганелон (Ganellone). Данте включає архетипного зрадника chanson de geste в реєстр Антенори — зрадників батьківщини і сюзерена.",
    dT:"В Chanson de Roland Ганелон з ненависті до Роланда змовляється з сарацинським царем Марсілієм, що призводить до загибелі ар'єргарду Карла Великого в Ронсевальській ущелині. Класичний архетип зрадника-васала." },
  { from:"d_09", to:"theb_viii_751", type:"ALLUSION",
    dF:"Данте бачить одну тінь, що гризе потилицю іншої «l\u00e0 've 'l cervel s'aggiugne con la nuca» — де мозок з'єднується з потилицею. Звіриний образ, що перевершує навіть Стаціїв.",
    dT:"В Thebais VIII Тідей, смертельно поранений Меналіппом, просить принести йому голову ворога і починає гризти її. Афіна, що несла йому безсмертя, побачивши це, відвертається з огидою. Один із найжахливіших образів античного епосу." },
  { from:"d_10", to:"aen_ii_3", type:"STRUCTURE",
    dF:"Уголіно піднімає голову від покараного і починає розповідь: «Tu vuo' ch'io rinovelli / disperato dolor» — ти хочеш, щоб я оновив відчайдушний біль. Формула inexpressibility topos перед страшною розповіддю.",
    dT:"В Aeneis II Еней починає розповідь про падіння Трої на прохання Дідони: «Infandum, regina, iubes renovare dolorem» — ти наказуєш оновити невимовний біль. Структурна модель: герой починає болісну розповідь на прохання слухача." },
];

const NODES_RAW = {
  d_01:    { label:"XXXII, 1\u20139",    sub:"rime aspre e chiocce",    author:"Данте",    col:0 },
  d_02:    { label:"XXXII, 10\u201312",  sub:"Амфіон і Фіви",          author:"Данте",    col:0 },
  d_03:    { label:"XXXII, 22\u201324",  sub:"Коціт — крига",           author:"Данте",    col:0 },
  d_04:    { label:"XXXII, 25\u201330",  sub:"Тамберніч",               author:"Данте",    col:0 },
  d_05:    { label:"XXXII, 56\u201360",  sub:"Caina",                    author:"Данте",    col:0 },
  d_06:    { label:"XXXII, 61\u201369",  sub:"брати Альберті",          author:"Данте",    col:0 },
  d_07:    { label:"XXXII, 88",          sub:"Antenora",                 author:"Данте",    col:0 },
  d_08:    { label:"XXXII, 106",         sub:"Ганелон",                  author:"Данте",    col:0 },
  d_09:    { label:"XXXII, 122\u2013123",sub:"гризе потилицю",          author:"Данте",    col:0 },
  d_10:    { label:"XXXII, 130\u2013132",sub:"Уголіно починає",         author:"Данте",    col:0 },
  aen_vi_264:   { label:"Aen. VI, 264\u2013267", sub:"invocatio Averni",      author:"Вергілій", col:1 },
  met_vi_178:   { label:"Met. VI, 178\u2013179", sub:"Амфіон і стіни Фів",   author:"Овідій",   col:1 },
  aen_vi_323:   { label:"Aen. VI, 323",          sub:"Cocytus",               author:"Вергілій", col:1 },
  phars_iii_300:{ label:"Phars. III, 300\u2013303",sub:"гіперболи масштабу",  author:"Лукан",    col:1 },
  gen_4:        { label:"Gen. 4:3\u201316",       sub:"Каїн і Авель",         author:"Біблія",   col:1 },
  theb_i_123:   { label:"Theb. I, 123\u2013164", sub:"Етеокл і Полінік",     author:"Стацій",   col:1 },
  aen_i_242:    { label:"Aen. I, 242\u2013249",  sub:"Антенор",               author:"Вергілій", col:1 },
  roland_178:   { label:"Roland, laisse 178\u2013186",sub:"зрада Ганелона", author:"Chanson de Roland", col:1 },
  theb_viii_751:{ label:"Theb. VIII, 751\u2013766",sub:"Тідей і Меналіпп",   author:"Стацій",   col:1 },
  aen_ii_3:     { label:"Aen. II, 3\u201313",    sub:"infandum dolorem",      author:"Вергілій", col:1 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"},
  "Chanson de Roland": {f:"#1e1e0e",s:"#b8a85a"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_32';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
