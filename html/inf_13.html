const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"aen_iii_209", type:"ALLUSION",
    dF:"Данте описує ліс самогубців, де гніздяться Гарпії — «l'Arpie, pascendo poi de le sue foglie, / fan dolore e al dolor fenestra». Вони обривають листя, завдаючи болю деревам-душам.",
    dT:"В Aeneis III троянці пристають до Строфад, де Гарпії — потворні птахи з жіночими обличчями — нападають і паскудять їжу. Целено пророкує: троянці їстимуть столи від голоду. Данте переносить Гарпій у пекло." },
  { from:"d_02", to:"aen_iii_22", type:"ALLUSION",
    dF:"Данте відламує гілку, і з розлому тече темна кров, а дерево кричить: «Perché mi schiante?» Пряма структурна і текстуальна алюзія на епізод Полідора в Aeneis.",
    dT:"В Aeneis III Еней зламує гілку на могилі Полідора, і з-під кори тече чорна кров: «heu fuge crudelis terras!» Полідор, убитий заради золота, перетворений на кущ. Цей епізод — головне джерело для Inf. XIII." },
  { from:"d_03", to:"aen_iii_39", type:"ALLUSION",
    dF:"Вергілій вибачається перед пораненим деревом, посилаючись на власний твір: «s'elli avesse potuto creder prima... ciò c'ha già letto ne la mia rima». Метатекстуальна алюзія — Вергілій цитує сам себе.",
    dT:"В Aeneis III Еней тричі ламає гілки, перш ніж почує голос Полідора. Жах і каяття — «quis tam crudelis optavit sumere poenas?» — стають моделлю для Дантової сцени, яку Вергілій-персонаж сам визнає." },
  { from:"d_04", to:"aen_vi_268", type:"THEMATIC",
    dF:"Данте входить у ліс без стежок — «non sentier verde, ma di color fosco» — простір без орієнтирів, темний і хаотичний. Ліс як метафора втрати шляху і самоідентифікації.",
    dT:"В Aeneis VI Еней і Сивілла йдуть у темряві через Аїд — «ibant obscuri sola sub nocte per umbram». Потойбічний простір як місце без чіткого шляху, де потрібен провідник." },
  { from:"d_05", to:"aen_vii_507", type:"THEMATIC",
    dF:"Данте порівнює ліс самогубців із дикими маремманськими лісами між Чечіною і Корнето — «non han sì aspri sterpi né sì folti».",
    dT:"В Aeneis VII Вергілій описує дикі ліси Лаціуму, де полює олень Сільвії, що стає приводом для війни. Дикий італійський ландшафт як простір небезпеки — наскрізний мотив Вергілія." },
  { from:"d_06", to:"aen_ii_3", type:"STRUCTURE",
    dF:"П'єр делла Вінья розповідає свою історію в елегантному риторичному стилі: «Io son colui che tenni ambo le chiavi / del cor di Federigo». Промова покараного — ars dictaminis.",
    dT:"В Aeneis II Еней починає розповідь про падіння Трої при дворі Дідони — високий стиль, риторична майстерність, емоційне напруження. Модель офіційної промови-сповіді в потойбічному контексті." },
  { from:"d_07", to:"phars_v_527", type:"THEMATIC",
    dF:"П'єр делла Вінья описує, як придворна заздрість (invidia) привела до його опали: «La meretrice che mai da l'ospizio / di Cesare non torse li occhi putti».",
    dT:"У Pharsalia Лукан описує інтриги й заздрість при дворі Цезаря, де наближені борються за вплив і знищують один одного. Мотив придворної invidia як руйнівної сили." },
  { from:"d_08", to:"aen_iv_642", type:"THEMATIC",
    dF:"П'єр каже: «l'animo mio... credendo col morir fuggir disdegno, / ingiusto fece me contra me giusto» — думаючи смертю втекти від зневаги, він став несправедливим до себе.",
    dT:"В Aeneis IV Дідона вбиває себе мечем Енея, намагаючись смертю втекти від ганьби покинутої коханки. Самогубство як хибний вихід із нестерпної ситуації — паралельний мотив." },
  { from:"d_09", to:"met_i_548", type:"STRUCTURE",
    dF:"П'єр пояснює механізм перетворення: душа падає в ліс, проростає як зерно, стає кущем, Гарпії обгризають листя — «fanno dolore, e al dolor fenestra». Деталізований опис метаморфози.",
    dT:"В Metamorphoses I Дафна перетворюється на лавр: шкіра стає корою, руки — гілками, волосся — листям, ноги — коренями. Овідій дає покрокову анатомію перетворення — модель, яку Данте застосовує до самогубців." },
  { from:"d_10", to:"met_ii_358", type:"THEMATIC",
    dF:"З розламаної гілки тече темна кров і звучать слова одночасно — «usciva insieme parole e sangue». Дерево-людина страждає фізично і вербально — гібридне існування.",
    dT:"В Metamorphoses II сестри Фаетона (Геліади) перетворюються на тополі й плачуть бурштиновими сльозами. Коли мати намагається відламати кору, тече кров і дочка кричить. Кров із дерева — канонічний овідіанський мотив." },
  { from:"d_11", to:"aen_iii_22b", type:"ALLUSION",
    dF:"Наприкінці канто марнотратець ховається за кущем, і його переслідувачі (чорні суки) розривають і кущ, і втікача. Душа-кущ, що страждає від чужого насильства, повторює мотив Полідора.",
    dT:"В Aeneis III Полідор, убитий заради золота, закопаний під кущем, що проростає із списів, якими його вбито. Його тіло і рослина злилися. Данте подвоює мотив: тепер страждає і дерево, і його невольний «гість»." },
  { from:"d_12", to:"met_iii_198", type:"STRUCTURE",
    dF:"Марнотратців переслідують і розривають на шматки чорні голодні суки — «nere cagne, bramose e correnti». Сцена полювання і розтерзання відтворює структуру міфу про Актеона.",
    dT:"В Metamorphoses III Актеон, перетворений на оленя Діаною, розтерзаний власними мисливськими собаками. Полювання стає карою: жертва-мисливець гине від того, що раніше було його інструментом. Contrapasso через метаморфозу." },
  { from:"d_13", to:"aen_vi_724", type:"INVERSION",
    dF:"П'єр пояснює: після Страшного Суду самогубці повісять свої тіла на власних деревах, але не вдягнуть їх. Тіло не повернеться до душі, що його відкинула — найстрашніший contrapasso.",
    dT:"В Aeneis VI Анхіз пояснює цикл метемпсихозу: душі очищуються і повертаються в нові тіла. У Данте це перевернуто: самогубці не лише не отримають нових тіл — вони не повернуть навіть старих." },
];

const NODES_RAW = {
  d_01:    { label:"XIII, 10\u201315",  sub:"Гарпії",                 author:"Данте",    col:0 },
  d_02:    { label:"XIII, 31\u201345",  sub:"гілка кричить",           author:"Данте",    col:0 },
  d_03:    { label:"XIII, 46\u201351",  sub:"Вергілій вибачається",    author:"Данте",    col:0 },
  d_04:    { label:"XIII, 25\u201327",  sub:"ліс без стежок",          author:"Данте",    col:0 },
  d_05:    { label:"XIII, 10\u201312",  sub:"Чечіна \u2014 Корнето",   author:"Данте",    col:0 },
  d_06:    { label:"XIII, 58\u201378",  sub:"П'єр делла Вінья",        author:"Данте",    col:0 },

  aen_vi_724:  { label:"Aen. VI, 724\u2013751",sub:"метемпсихоз",          author:"Вергілій",col:1 },

  met_iii_198: { label:"Met. III, 198\u2013252",sub:"Актеон і пси",        author:"Овідій",  col:1 },

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_13';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
