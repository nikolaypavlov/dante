<!DOCTYPE html>
<html lang="uk" class="theme-purgatorio">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purg. XXVI — Інтертекстуальне дерево</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="../dante-theme.css">
</head>
<body>
<div class="side-panel-overlay" id="overlay" onclick="togglePanel()"></div>
<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="purg_25.html">← Purg. XXV</a>
    <div class="title-block"><h1>Purgatorio XXVI</h1><p>Інтертекстуальне дерево джерел — Ґвініцеллі та Арнаут Даніель</p></div>
    <a class="nav-arrow" href="purg_27.html">Purg. XXVII →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"aen_vi_290", type:"INVERSION",
    dF:"Душі помічають, що тіло Данте відкидає тінь, на відміну від них. Мотив живого серед мертвих, інвертований: тут живе тіло виділяється серед ефірних душ.",
    dT:"В Aeneis VI тіні в Аїді описані як безтілесні форми. Еней, живий серед мертвих, виділяється, але Вергілій не акцентує цей контраст так виразно, як Данте." },
  { from:"d_02", to:"aen_vi_540", type:"STRUCTURE",
    dF:"Два натовпи душ рухаються назустріч одне одному, обмінюються поцілунками і розходяться — структура зустрічних потоків.",
    dT:"В Aeneis VI Вергілій описує роздоріжжя, де дорога розділяється на шлях до Тартару і до Елісію. Мотив двох протилежних напрямків у потойбіччі." },
  { from:"d_03", to:"met_iv", type:"ALLUSION",
    dF:"Одна з двох груп хтивців кричить «nostro peccato fu ermafrodito» — вони грішили протиприродно. Пряме посилання на овідіанський міф.",
    dT:"В четвертій книзі Metamorphoses Овідій розповідає про злиття юнака Гермафродита з німфою Салмакідою в єдине двостатеве тіло." },
  { from:"d_04", to:"guiniz", type:"ALLUSION",
    dF:"Данте зустрічає Ґвідо Ґвініцеллі і називає його «батьком» своїм і «кращим» серед поетів, що писали «dolci rime d'amor».",
    dT:"Канцона Ґвініцеллі «Al cor gentil» заклала основи стильновістської поетики: кохання як привілей благородного серця." },
  { from:"d_05", to:"theb_v", type:"ALLUSION",
    dF:"Данте порівнює свою радість при зустрічі з Ґвініцеллі з радістю синів Гіпсіпіли, коли вони знайшли матір серед покараних.",
    dT:"В п'ятій книзі Thebais Стацій описує зустріч синів Гіпсіпіли з матір'ю. Момент впізнання і радості серед горя." },
  { from:"d_06", to:"arnaut", type:"ALLUSION",
    dF:"Ґвініцеллі вказує на Арнаута Даніеля як «miglior fabbro del parlar materno» — кращого майстра рідної мови.",
    dT:"Арнаут Даніель — провансальський трубадур XII ст., майстер trobar clus. Його секстина «Lo ferm voler» — вершина формальної майстерності трубадурської поезії." },
  { from:"d_06", to:"guittone", type:"INVERSION",
    dF:"Ґвініцеллі відкидає тих, хто вважав Ґвіттоне найкращим поетом: інверсія літературної ієрархії.",
    dT:"Ґвіттоне д'Ареццо вважався найвизначнішим італомовним поетом до стильновістів. Данте через Ґвініцеллі перевертає цю ієрархію." },
  { from:"d_07", to:"arnaut_2", type:"ALLUSION",
    dF:"Арнаут Даніель промовляє провансальською — єдиний випадок у Commedia, де персонаж говорить чужою мовою цілою октавою.",
    dT:"Провансальська поезія Арнаута відзначалась вишуканістю форми та звукової тканини. Данте вставляє аутентичний провансальський текст." },
];

const NODES_RAW = {
  d_01:    { label:"XXVI, 16\u201318", sub:"тінь живого тіла",         author:"Данте",    col:0 },
  d_02:    { label:"XXVI, 40\u201342", sub:"два потоки душ",           author:"Данте",    col:0 },
  d_03:    { label:"XXVI, 82\u201384", sub:"ermafrodito",              author:"Данте",    col:0 },
  d_04:    { label:"XXVI, 92\u201393", sub:"Ґвініцеллі \u2014 батько",author:"Данте",    col:0 },
  d_05:    { label:"XXVI, 97\u201399", sub:"Гіпсіпіла / впізнання",   author:"Данте",    col:0 },
  d_06:    { label:"XXVI, 115\u2013120",sub:"miglior fabbro",          author:"Данте",    col:0 },
  d_07:    { label:"XXVI, 140\u2013147",sub:"провансальська промова",   author:"Данте",    col:0 },
  aen_vi_290:  { label:"Aen. VI, 290\u2013294",sub:"тіні без тіла",    author:"Вергілій", col:1 },
  aen_vi_540:  { label:"Aen. VI, 540\u2013543",sub:"роздоріжжя Аїду",  author:"Вергілій", col:1 },
  met_iv:      { label:"Met. IV, 285\u2013388",sub:"Гермафродит",       author:"Овідій",   col:1 },
  guiniz:      { label:"Guinizelli, Al cor gentil",sub:"новий стиль",   author:"Ґвініцеллі", col:1 },
  theb_v:      { label:"Theb. V, 720\u2013730",sub:"Гіпсіпіла",        author:"Стацій",   col:1 },
  arnaut:      { label:"Arnaut, Lo ferm voler", sub:"trobar clus",      author:"Арнаут Даніель", col:1 },
  guittone:    { label:"Guittone d'Arezzo",     sub:"старий стиль",     author:"Ґвіттоне д'Ареццо", col:1 },
  arnaut_2:    { label:"Arnaut, Sols sui",      sub:"провансальська",    author:"Арнаут Даніель", col:1 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281e14",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Ґвініцеллі": {f:"#1e1e28",s:"#8e8ece"},
  "Арнаут Даніель": {f:"#28280e",s:"#cece5a"},
  "Ґвіттоне д'Ареццо": {f:"#201e28",s:"#9e7ece"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id",`a-${t}`).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return`M${sx},${s.y} C${sx+dx*.45},${s.y} ${tx-dx*.45},${t.y} ${tx},${t.y}`}
const linkG=svg.append("g");const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path").attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to])).attr("fill","none").attr("stroke",d=>TC[d.type]).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6).attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none").attr("opacity",.5).attr("marker-end",d=>`url(#a-${d.type})`);

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g").attr("transform",d=>`translate(${d.x-nodeW/2},${d.y-nodeH/2})`).style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5).attr("fill",d=>AS[d.author]?.f||"#1a1a1a").attr("stroke",d=>AS[d.author]?.s||"#333").attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text').trim()).attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500).text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text-muted').trim()).attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic").text(d=>d.sub);
ne.filter(d=>d.col>0).append("text").attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle").attr("fill",d=>AS[d.author]?.s||"#555").attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7).text(d=>d.author);

ne.on("mouseover",function(ev,d){const ids=new Set([d.id]);LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04).attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});nodeG.selectAll("g").select("rect").attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";return '<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>'}).join("<br><br>");
if(parts)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+parts).style("opacity",1).style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")}).on("mouseout",function(){linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);nodeG.selectAll("g").select("rect").attr("opacity",1);tooltip.style("opacity",0)});

function togglePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}});
(function(){var r=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],o='';for(var i=0;i<v.length;i++)while(n>=v[i]){o+=s[i];n-=v[i]}return o};var p=function(n){return String(n).padStart(2,'0')};var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];var cur='purg_26';var container=document.getElementById('panelContent');ct.forEach(function(c){var sec=document.createElement('div');sec.className='side-panel-section';var h3=document.createElement('h3');h3.textContent=c.t;sec.appendChild(h3);for(var i=1;i<=c.c;i++){var f=c.x+'_'+p(i);var a=document.createElement('a');a.href=f+'.html';a.textContent=c.a+' '+r(i);if(f===cur)a.className='current';sec.appendChild(a)}container.appendChild(sec)})})();
</script>
</body>
</html>
