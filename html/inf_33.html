<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="../dante-theme.css">
</head>
<body>
<div class="side-panel-overlay" id="overlay" onclick="togglePanel()"></div>
<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="inf_32.html">← Inf. XXXII</a>
    <div class="title-block"><h1>Inferno XXXIII</h1><p>Інтертекстуальне дерево джерел</p></div>
    <a class="nav-arrow" href="inf_34.html">Inf. XXXIV →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"aen_ii_3", type:"ALLUSION",
    dF:"Уголіно продовжує: «Tu vuo' ch'io rinovelli / disperato dolor che 'l cor mi preme» — формула «оновити відчайдушний біль» є прямим перекладом вергіліанської формули.",
    dT:"В Aeneis II Еней починає розповідь на банкеті Дідони: «Infandum, regina, iubes renovare dolorem» — «Невимовний, царице, біль ти наказуєш оновити». Пряма вербальна алюзія: renovare dolorem \u2192 rinovelli disperato dolor." },
  { from:"d_02", to:"aen_vi_552", type:"THEMATIC",
    dF:"Уголіно розповідає про в'язницю — вежу голоду (torre della fame), де він був замкнений з синами. Вежа як місце заточення, звідки видно лише вузьку щілину світла.",
    dT:"В Aeneis VI Тартар оточений вежею з залізними стінами, де замкнені покарані. Ferrea turris як архітектура потойбічного заточення — тематична паралель до вежі, де Уголіно заточений у земному пеклі." },
  { from:"d_03", to:"met_xi_633", type:"STRUCTURE",
    dF:"Уголіно бачить пророчий сон: Руджері, як ловець, женеться з псами на вовка та вовченят. Пси розривають звірів — символічне передбачення того, що станеться з Уголіно та його дітьми.",
    dT:"В Metamorphoses XI Овідій описує печеру Сомнуса і механізм пророчих снів, зокрема сон Алкіони, де з'являється Морфей у подобі загиблого Кеїка. Структурна модель: пророчий сон передвіщає трагедію, що вже відбулася." },
  { from:"d_04", to:"thren_4", type:"ALLUSION",
    dF:"Уголіно прокидається і чує, як діти плачуть уві сні й просять хліба. Образ голодних дітей, що благають їсти, перегукується з біблійним плачем.",
    dT:"В Lamentationes (Плач Єремії) 4:4: «parvuli petierunt panem, et non erat qui frangeret eis» — «малі діти просили хліба, і не було кому ламати їм». Образ невинних дітей, приречених на голодну смерть, як вершина трагізму." },
  { from:"d_05", to:"met_vi_301", type:"THEMATIC",
    dF:"Уголіно не плаче, не говорить — «Io non piangea, s\u00ec dentro impietrai» — скам'янів зсередини. Горе перетворює батька на камінь, поки діти плачуть навколо нього.",
    dT:"В Metamorphoses VI Ніоба, втративши всіх чотирнадцятьох дітей від стріл Аполлона і Діани, перетворюється на скелю, але продовжує плакати. Овідієва метаморфоза горя в камінь — прототип Дантового «impietrare»." },
  { from:"d_06", to:"aen_ii_547", type:"THEMATIC",
    dF:"Ґаддо, один із синів Уголіно, падає до батькових ніг і вмирає зі словами «Padre mio, ch\u00e9 non m'aiuti?» — «Батьку мій, чому ти мені не допомагаєш?» Смерть дитини на очах у безсилого батька.",
    dT:"В Aeneis II Пріам гине на очах у сім'ї, коли Пірр вбиває його сина Політа перед батьковими очима, а потім самого царя. Мотив батька, що безсило спостерігає загибель дитини — центральна вергіліанська травма." },
  { from:"d_07", to:"met_xiii_528", type:"THEMATIC",
    dF:"Після смерті останньої дитини Уголіно, осліплений голодом, навпомацки повзає по тілах синів і кличе їх по імені: «poscia, pi\u00f9 che 'l dolor, pot\u00e9 'l digiuno» — голод зміг більше, ніж біль.",
    dT:"В Metamorphoses XIII Гекуба схиляється над тілом Полідора і тілом Поліксени, обмиваючи їх кров'ю своїх сліз. Мати (батько), що залишається з тілами загиблих дітей — кульмінація трагічного пафосу." },
  { from:"d_08", to:"theb_i_1", type:"THEMATIC",
    dF:"Данте вигукує «Ahi Pisa, vituperio de le genti!» і називає Пізу «novella Tebe» — новими Фівами, містом, де гинуть невинні. Порівняння з Фівами як архетипом проклятого міста.",
    dT:"В Thebais I Стацій описує Фіви як місто, вражене спадковим прокляттям дому Кадма і Едіпа: братовбивство, батьковбивство, інцест. «Novella Tebe» — Данте переносить фіванський архетип на Пізу." },
  { from:"d_09", to:"mcc_16", type:"ONOMASTIC",
    dF:"Третя зона Коціту названа Толомеєю — на честь Птолемея, сина Авува, який запросив тестя Симона Маккавея на бенкет і вбив його разом із синами. Зрада гостинності.",
    dT:"В 1 Maccabaeorum 16 Птолемей, зять Симона, влаштовує бенкет у Єріхонській фортеці й під час нього вбиває Симона та двох його синів. Архетип зради гостинності — найтяжчий злочин в античному та біблійному кодексі честі." },
  { from:"d_10", to:"aen_iv_385", type:"INVERSION",
    dF:"Фра Альберіго пояснює, що душа зрадника потрапляє до пекла ще за життя, а тіло далі ходить по землі, кероване демоном. Вражаюча інверсія: тілесне життя без душі.",
    dT:"В Aeneis IV Дідона проклинає Енея, але її прокляття діє після смерті: її тінь переслідуватиме його. Данте інвертує: у зрадників душа йде до пекла ще за життя, тоді як тіло продовжує існувати — демонічна пародія на життя." },
];

const NODES_RAW = {
  d_01:    { label:"XXXIII, 4\u20136",    sub:"disperato dolor",        author:"Данте",    col:0 },
  d_02:    { label:"XXXIII, 13\u201318",  sub:"torre della fame",       author:"Данте",    col:0 },
  d_03:    { label:"XXXIII, 22\u201336",  sub:"пророчий сон",           author:"Данте",    col:0 },
  d_04:    { label:"XXXIII, 37\u201339",  sub:"діти просять хліба",     author:"Данте",    col:0 },
  d_05:    { label:"XXXIII, 46\u201349",  sub:"impietrai",              author:"Данте",    col:0 },
  d_06:    { label:"XXXIII, 67\u201369",  sub:"Padre mio!",             author:"Данте",    col:0 },
  d_07:    { label:"XXXIII, 75\u201378",  sub:"pi\u00f9 che 'l dolor",  author:"Данте",    col:0 },
  d_08:    { label:"XXXIII, 79\u201390",  sub:"novella Tebe",           author:"Данте",    col:0 },
  d_09:    { label:"XXXIII, 91",          sub:"Tolomea",                 author:"Данте",    col:0 },
  d_10:    { label:"XXXIII, 118\u2013120",sub:"душа в пеклі за життя",  author:"Данте",    col:0 },
  aen_ii_3:     { label:"Aen. II, 3\u201313",    sub:"infandum dolorem",      author:"Вергілій", col:1 },
  aen_vi_552:   { label:"Aen. VI, 552\u2013558", sub:"ferrea turris",         author:"Вергілій", col:1 },
  met_xi_633:   { label:"Met. XI, 633\u2013670", sub:"печера Сомнуса",        author:"Овідій",   col:1 },
  thren_4:      { label:"Thren. 4:4",            sub:"parvuli petierunt",     author:"Біблія",   col:1 },
  met_vi_301:   { label:"Met. VI, 301\u2013312", sub:"Ніоба — камінь",        author:"Овідій",   col:1 },
  aen_ii_547:   { label:"Aen. II, 547\u2013553", sub:"смерть Пріама",         author:"Вергілій", col:1 },
  met_xiii_528: { label:"Met. XIII, 528\u2013575",sub:"Гекуба над тілами",    author:"Овідій",   col:1 },
  theb_i_1:     { label:"Theb. I, 1\u201317",    sub:"Фіви проклятi",         author:"Стацій",   col:1 },
  mcc_16:       { label:"1 Mcc. 16:15\u201317",  sub:"Птолемей і Симон",      author:"Біблія",   col:1 },
  aen_iv_385:   { label:"Aen. IV, 385\u2013387", sub:"прокляття Дідони",      author:"Вергілій", col:1 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_33';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
