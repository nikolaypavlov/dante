<body>

<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<div class="legend">

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"met_ix_421_424", type:"ALLUSION",
    dF:"Данте відкриває пісню перифразою часу: «la concubina di Titone antico» — коханка старого Тітона сяяла на східному балконі. Вишуканий астрономічний хронограф.",
    dT:"В Metamorphoses Овідій оповідає про Аврору, богиню зорі, та її коханця Тітона, якому дарували безсмертя без вічної молодості. Перифраза зорі через мітологічну пару." },
  { from:"d_02", to:"met_x_155_161", type:"ALLUSION",
    dF:"Данте бачить сон: орел із золотим пір\'ям підхоплює його і підносить до вогняної сфери. Він прямо порівнює себе з Ганімедом: «forse non da questo loco, dove Ganimede fu ratto».",
    dT:"В Met. X Орфей оповідає, як Юпітер у подобі орла викрав фрігійського юнака Ганімеда на Олімп. Архетип піднесення через божественне викрадення." },
  { from:"d_03", to:"ach_i_247_250", type:"ALLUSION",
    dF:"Данте прокидається зблідлий від жаху і порівнює себе з Ахіллом, якого мати таємно перенесла на Скірос: «non altrimenti Achille si riscosse».",
    dT:"В Achilleis Стацій описує, як Фетіда таємно переносить сонного Ахілла з печери Хірона на острів Скірос. Ахілл прокидається розгублений у незнайомому місці." },
  { from:"d_04", to:"aen_v_838_861", type:"THEMATIC",
    dF:"Данте заснув і був перенесений Лучією до брами Чистилища — переміщення сонного героя в потойбічному просторі.",
    dT:"В Aeneis V бог Сну усипляє кермчого Палінура і той падає в море. Мотив надприродного сну, що переміщує або трансформує героя під час подорожі." },
  { from:"d_05", to:"aen_vi_548_559", type:"STRUCTURE",
    dF:"Брама Чистилища має три ступені: білий мармур, темний тріснутий камінь, червоний порфір. Потойбічний вхід із символічною архітектурою.",
    dT:"В Aeneis VI Вергілій описує ворота Тартару з масивним порогом і залізними колонами. Модель монументального потойбічного входу з символічними деталями." },
  { from:"d_06", to:"gen_3_24", type:"STRUCTURE",
    dF:"Ангел-вартовий сидить на порозі з мечем і вимагає пароль: «Dite costinci: che volete voi?». Він охороняє вхід до Чистилища, стережучи від недостойних.",
    dT:"У Genesis Бог поставив Херувима з полум\'яним мечем охороняти вхід до Едемського саду. Архетип ангельського вартового при сакральному вході." },
  { from:"d_07", to:"apoc_7_3", type:"ALLUSION",
    dF:"Ангел вістрям меча вирізує на чолі Данте сім літер P (peccatum). Фізичне маркування гріхів, що будуть стерті на кожному терасі.",
    dT:"В Apocalypsis ангел ставить печать на чолах праведних: «signa super frontes virorum». Мотив сакрального знаку на чолі як маркера духовного стану." },
  { from:"d_08", to:"mt_16_19", type:"ALLUSION",
    dF:"Ангел відмикає браму двома ключами — золотим і срібним, отриманими від Петра. Золотий — влада відпущення, срібний — мудрість розпізнання.",
    dT:"Христос передає Петру ключі Царства Небесного: «tibi dabo claves regni caelorum». Данте адаптує один ключ як два — символ подвійної природи сповіді." },
  { from:"d_09", to:"phars_iii_153_168", type:"ALLUSION",
    dF:"Брама скрипить, відчиняючись, і Данте порівнює звук із гуркотом, коли відчиняли скарбницю на Тарпейській скелі: «né sì forte ruggìo Tarpëa». Цезар розграбував її, і вона стала бідною.",
    dT:"В Pharsalia Лукан описує, як Цезар увійшов до Рима і відчинив скарбницю на Тарпейській скелі, незважаючи на спротив трибуна Метелла. Скрип і опір воріт." },
  { from:"d_10", to:"aen_vi_637_644", type:"THEMATIC",
    dF:"За брамою Данте чує «Te Deum laudamus» — хвалебний гімн, що змішується з музикою. Перший звук усередині Чистилища.",
    dT:"В Aeneis VI Еней чує спів і музику, увійшовши до Елісейських полів. Мотив хорального співу, що зустрічає героя за порогом блаженного простору." },
];

const NODES_RAW = {
  "d_01": { label:"IX, 1–9", sub:"Аврора — la concubina di Titone ant", author:"Данте", col:0 },
  "met_ix_421_424": { label:"Met. IX, 421–424", sub:"Aurora / Tithonus", author:"Овідій", col:1 },
  "d_02": { label:"IX, 13–33", sub:"сон про орла — Ганімед", author:"Данте", col:0 },
  "met_x_155_161": { label:"Met. X, 155–161", sub:"Юпітер викрадає Ганімеда", author:"Овідій", col:1 },
  "d_03": { label:"IX, 34–42", sub:"пробудження з жахом — Ахілл на Скір", author:"Данте", col:0 },
  "ach_i_247_250": { label:"Ach. I, 247–250", sub:"Ахілл прокидається на Скіросі", author:"Стацій", col:1 },
  "d_04": { label:"IX, 34–42", sub:"перенесення сонного героя", author:"Данте", col:0 },
  "aen_v_838_861": { label:"Aen. V, 838–861", sub:"Палінур засинає і падає", author:"Вергілій", col:1 },
  "d_05": { label:"IX, 76–84", sub:"три ступені брами — біла, темна, че", author:"Данте", col:0 },
  "aen_vi_548_559": { label:"Aen. VI, 548–559", sub:"ворота Тартару", author:"Вергілій", col:1 },
  "d_06": { label:"IX, 94–105", sub:"ангел-вартовий із мечем", author:"Данте", col:0 },
  "gen_3_24": { label:"Gen. 3:24", sub:"Херувим біля входу до Едему", author:"Біблія", col:1 },
  "d_07": { label:"IX, 112–114", sub:"сім P на чолі — septem peccata", author:"Данте", col:0 },
  "apoc_7_3": { label:"Apoc. 7:3", sub:"печать на чолах рабів Божих", author:"Біблія", col:1 },
  "d_08": { label:"IX, 117–126", sub:"два ключі — золотий і срібний", author:"Данте", col:0 },
  "mt_16_19": { label:"Mt. 16:19", sub:"ключі Петра", author:"Біблія", col:1 },
  "d_09": { label:"IX, 133–138", sub:"брама скрипить — Тарпейська скеля", author:"Данте", col:0 },
  "phars_iii_153_168": { label:"Phars. III, 153–168", sub:"aerarium на Тарпейській скелі", author:"Лукан", col:1 },
  "d_10": { label:"IX, 139–145", sub:"Te Deum laudamus — спів за брамою", author:"Данте", col:0 },
  "aen_vi_637_644": { label:"Aen. VI, 637–644", sub:"спів праведних в Елісії", author:"Вергілій", col:1 },
};

const AUTHOR_STYLES = {
  "Біблія": {f:"#280e0e",s:"#ce5a5a"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Данте": {f:"#281e14",s:"#d4a853"},
  "Лукан": {f:"#0e2028",s:"#5abecc"},
  "Овідій": {f:"#280e1a",s:"#ce5a8a"},
  "Стацій": {f:"#0e1428",s:"#5a78ce"},
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);const defs=svg.append("defs");Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});const nCols=colX.length;const cw=svgW/nCols;colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});
function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path").attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to])).attr("fill","none").attr("stroke",d=>TC[d.type]).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6).attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none").attr("opacity",.5).attr("marker-end",d=>"url(#a-"+d.type+")");
const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g").attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")").style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5).attr("fill",d=>AS[d.author]?.f||"#1a1a1a").attr("stroke",d=>AS[d.author]?.s||"#333").attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text').trim()).attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500).text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text-muted').trim()).attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic").text(d=>d.sub);
ne.filter(d=>d.col>0).append("text").attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle").attr("fill",d=>AS[d.author]?.s||"#555").attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7).text(d=>d.author);
ne.on("mouseover",function(ev,d){const ids=new Set([d.id]);LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04).attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});nodeG.selectAll("g").select("rect").attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";return'<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>'}).join("<br><br>");
if(parts)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+parts).style("opacity",1).style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")
}).on("mousemove",function(ev){tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")}).on("mouseout",function(){linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);nodeG.selectAll("g").select("rect").attr("opacity",1);tooltip.style("opacity",0)});
function togglePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}});
(function buildNav(){var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};var pad2=function(n){return String(n).padStart(2,'0')};var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];var cur='purg_09';var container=document.getElementById('panelContent');ct.forEach(function(c){var sec=document.createElement('div');sec.className='side-panel-section';var h3=document.createElement('h3');h3.textContent=c.t;sec.appendChild(h3);for(var i=1;i<=c.c;i++){var f=c.x+'_'+pad2(i);var a=document.createElement('a');a.href=f+'.html';a.textContent=c.a+' '+roman(i);if(f===cur)a.className='current';sec.appendChild(a)}container.appendChild(sec)})})(  );
</script>
</body>
</html>
