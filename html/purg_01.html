const LINKS_DATA=[
  {from:"d_01",to:"aen_vi_384",type:"STRUCTURE",
    dF:"Данте відкриває другу кантику навігаційною метафорою: «корабельце мого хисту піднімає вітрила» — поезія як плавання, що виходить із жорстокого моря Inferno до кращих вод.",
    dT:"В Aeneis VI Еней завершує сходження до Аїду і виходить через ворота зі слонової кості. Структурна модель переходу від підземного світу до нового етапу подорожі стає каркасом для початку Purgatorio."},
  {from:"d_02",to:"met_i_1",type:"STRUCTURE",
    dF:"Данте закликає Муз підняти «мертву поезію» — традиційна інвокація на початку нового розділу епічного твору, з наголосом на тематичному оновленні.",
    dT:"Овідій відкриває Metamorphoses зверненням до богів із проханням надихнути його пісню про тіла, змінені в нові форми (in nova fert animus mutatas dicere formas). Інвокація як жанровий маркер початку нової поеми."},
  {from:"d_02",to:"met_v_338",type:"ALLUSION",
    dF:"Данте звертається до святих Муз і окремо до Каліопи — музи епічної поезії, просячи її піднятися зі своїм співом, що переміг П'єрід.",
    dT:"В Met. V Каліопа співає від імені Муз у змаганні з П'єрідами (дочками Пієра), які зухвало кинули виклик. Каліопа перемагає, а П'єріди перетворюються на сорок."},
  {from:"d_03",to:"aen_viii_86",type:"THEMATIC",
    dF:"Данте описує ранкове небо, чисте аж до горизонту, колір «східного сапфіру» — після темряви Inferno це перший пейзаж світла й відкритого простору.",
    dT:"В Aeneis VIII Еней прокидається на березі Тибру і бачить ранковий пейзаж після нічного плавання. Мотив зорі як початку нового етапу подорожі — спільний топос."},
  {from:"d_04",to:"aen_viii_590",type:"THEMATIC",
    dF:"Данте бачить Венеру — «гарну планету, що любити спонукає» — на ранковому небі, вона засліплює сузір'я Риб. Венера як знак любові й нового початку.",
    dT:"В Aeneis VIII Венера з'являється на небі як знак-зірка, несучи Енеєві божественну зброю — arma inter nubem. Планета Венера як провісниця доброго повороту подорожі."},
  {from:"d_05",to:"georg_i_240",type:"THEMATIC",
    dF:"Данте бачить чотири зорі, яких ніхто не бачив з часів «перших людей». Це зорі Південного полюсу, невидимі в Північній півкулі — поетичний образ нового неба.",
    dT:"В Georgica I Вергілій згадує зорі антиподів, які ніколи не бачать мешканці Північної півкулі. Ідея невидимих зірок над нижнім полюсом стає джерелом Дантового образу чотирьох зір."},
  {from:"d_06",to:"phars_ii_234",type:"ALLUSION",
    dF:"Данте бачить старця з довгою бородою, посрібленою сивиною, осяяного чотирма зорями так, що його обличчя сяє, наче сонце. Це Катон Утицький — вартовий Чистилища.",
    dT:"У Pharsalia II Лукан малює Катона як зразок стоїчної доброчесності: він відмовляється від розкоші, бере шлюб лише заради обов'язку, його мета — служити людству і дотримуватись правди."},
  {from:"d_06",to:"aen_viii_670",type:"ONOMASTIC",
    dF:"Катон Утицький як символ республіканської доброчесності — образ, закріплений у кількох латинських джерелах. Данте робить його охоронцем Чистилища.",
    dT:"На щиті Енея Вулкан зображує Катона, що дає закони праведним душам у Елісіумі — «his dantem iura Catonem». Вергілій поміщає Катона серед блаженних, що легітимізує Дантове рішення."},
  {from:"d_07",to:"phars_ix_371",type:"INVERSION",
    dF:"Катон суворо допитує пілігримів: чи порушено закони Пекла? Його роль — стоїчний суворий вартовий, але на порозі надії, а не безнадії.",
    dT:"У Pharsalia IX Катон веде армію через лівійську пустелю, відмовляючись від оракула Юпітера-Амона. Данте інвертує контекст: замість пустелі — берег порятунку, замість стоїчної самодостатності — підпорядкування божественній волі."},
  {from:"d_08",to:"aen_vi_119",type:"STRUCTURE",
    dF:"Вергілій пояснює Катону, що небесна дама зійшла і попросила його провести Данте. Структура авторизації подорожі через вищу інстанцію.",
    dT:"В Aeneis VI Сивілла веде Енея до підземного світу за волею богів. Модель «провідник, уповноважений вищою силою» — структурне ядро, яке Данте адаптує."},
  {from:"d_09",to:"phars_ii_326",type:"ALLUSION",
    dF:"Вергілій просить Катона заради Марції, яка «ще вблагає твої очі». Посилання на дружину Катона як аргумент, щоб отримати пропуск.",
    dT:"У Pharsalia II Марція, після смерті Гортензія, повертається до Катона і просить відновити шлюб. Катон погоджується без радості — цей шлюб є актом обов'язку, не пристрасті."},
  {from:"p_10",to:"phars_ii_350",type:"INVERSION",
    dF:"Катон відповідає, що Марція тепер за Ахеронтом і не може його зворушити — земні зв'язки не діють у потойбіччі. Він погоджується допомогти лише через небесний наказ.",
    dT:"У Pharsalia II Катон приймає Марцію назад з обов'язку. Данте інвертує: у потойбіччі навіть обов'язок перед нею не діє, лише небесна воля має силу."},
  {from:"p_11",to:"aen_vi_136",type:"INVERSION",
    dF:"Катон наказує оперезати Данте гладким очеретом і вмити обличчя від бруду Пекла — ритуал очищення та підготовки до нового етапу.",
    dT:"В Aeneis VI Сивілла вказує Енеєві зірвати золоту гілку як перепустку до Аїду. Данте інвертує: замість золота — смиренний очерет; замість сходження до пекла — вихід із нього."},
  {from:"p_12",to:"aen_vi_635",type:"THEMATIC",
    dF:"Вергілій збирає росу з трави і вмиває Данте обличчя, повертаючи йому природний колір, змитий сажею Пекла. Роса як символ очищення.",
    dT:"В Aeneis VI Елісейські поля залиті власним сонцем і вкриті росою. Мотив роси як ознака блаженного місця, де відбувається оновлення душі."},
  {from:"p_13",to:"met_i_416",type:"THEMATIC",
    dF:"Зірвана очеретина миттєво відростає на тому самому місці — «o meraviglia!» Чудо оновлення як знак благодаті Чистилища.",
    dT:"У Met. I Овідій описує спонтанне зародження життя після Девкаліонового потопу — земля сама породжує нові форми. Мотив чудесного відновлення рослинності є частиною ширшої овідіанської теми метаморфози."},
  {from:"p_13",to:"aen_vi_143",type:"ALLUSION",
    dF:"Зірваний очерет негайно відростає заново — пряма паралель до чудесної гілки в Aeneis, яка також регенерує.",
    dT:"В Aeneis VI Сивілла пояснює: коли золоту гілку зривають, на її місці виростає нова — «primo avulso non deficit alter aureus». Мотив магічної регенерації рослини Данте переносить на смиренний очерет."}
];

const AUTHOR_STYLES={

  "Вергілій": {f:"#1a0e28",s:"#a06ece"},

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);nodes.forEach(n=>{n.x=colX[n.col]});const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);const defs=svg.append("defs");Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id",`a-${t}`).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});const nCols=colX.length;const cw=svgW/nCols;colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return`M${sx},${s.y} C${sx+dx*.45},${s.y} ${tx-dx*.45},${t.y} ${tx},${t.y}`}
const linkG=svg.append("g");const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path").attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to])).attr("fill","none").attr("stroke",d=>TC[d.type]).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6).attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none").attr("opacity",.5).attr("marker-end",d=>`url(#a-${d.type})`);
const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g").attr("transform",d=>`translate(${d.x-nodeW/2},${d.y-nodeH/2})`).style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5).attr("fill",d=>AS[d.author]?.f||"#1a1a1a").attr("stroke",d=>AS[d.author]?.s||"#333").attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text').trim()).attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500).text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text-muted').trim()).attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic").text(d=>d.sub);
ne.filter(d=>d.col>0).append("text").attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle").attr("fill",d=>AS[d.author]?.s||"#555").attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7).text(d=>d.author);
ne.on("mouseover",function(ev,d){const ids=new Set([d.id]);LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04).attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});nodeG.selectAll("g").select("rect").attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";return'<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>'});
var h=parts.join("<br><br>");
if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h).style("opacity",1).style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")
}).on("mousemove",function(ev){tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")}).on("mouseout",function(){linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);nodeG.selectAll("g").select("rect").attr("opacity",1);tooltip.style("opacity",0)});
function togglePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}});
(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='purg_01';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
