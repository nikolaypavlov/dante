</head>
<body>

<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="inf_09.html">← Inf. IX</a>
    <div class="title-block"><h1>Inferno X</h1><p>Інтертекстуальне дерево джерел</p></div>
    <a class="nav-arrow" href="inf_11.html">Inf. XI →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"aen_vi_735", type:"THEMATIC",
    dF:"Вергілій пояснює, що тут покарані Епікур і його послідовники, які вірили, що душа вмирає з тілом. Категорія єретиків-матеріалістів у Дантовому пеклі.",
    dT:"В Aeneis VI Вергілій описує загробну космологію, де душі існують після смерті тіла й очищуються для нового втілення. Ця модель безсмертя душі прямо протилежна епікурейському запереченню." },
  { from:"d_02", to:"phars_vi_750", type:"STRUCTURE",
    dF:"Фарината піднімається з відкритого саркофага — «s'era levata dalla cintola in su» — від пояса вгору, зневажливо озираючи пекло. Образ тіла, що піднімається з гробу, нагадує некромантичну сцену Лукана.",
    dT:"В Pharsalia VI мертвий солдат, воскрешений Еріхто, піднімається з трупа — він стоїть непевно, зі страхом дивиться навколо. У Данте цей образ інвертовано: Фарината піднімається гордо і зневажливо." },
  { from:"d_03", to:"phars_i_128", type:"THEMATIC",
    dF:"Фарината тримається так, «наче мав пекло за нікчемність» — героїчна гордість перед лицем покарання. Образ непохитної волі серед катастрофи.",
    dT:"На початку Pharsalia Лукан описує Цезаря як людину безмежної ambition, що зневажає перешкоди й не знає страху. Модель героїчної hybris — гордості, що не згинається навіть перед силою долі." },
  { from:"d_04", to:"aen_ii_547", type:"THEMATIC",
    dF:"Фарината — велична фігура, що з гідністю тримається серед руйнування своєї партії й роду. Образ великого лідера, що зберігає гордість після катастрофи.",
    dT:"В Aeneis II старий Пріам гине біля свого вівтаря під час падіння Трої — цар, що тримає гідність до останнього моменту. Модель великого мужа, що не ломиться навіть перед загибеллю." },
  { from:"d_05", to:"aen_vi_679", type:"INVERSION",
    dF:"Кавальканте деї Кавальканті піднімається поруч із Фаринатою й запитує про свого сина Ґвідо: чи він живий? Батьківське горе в потойбіччі — інверсія радісної зустрічі Анхіза й Енея.",
    dT:"В Aeneis VI Анхіз зустрічає сина Енея в Елісеї зі сльозами радості й показує йому майбутню славу Рима. У Данте цю модель перевернуто: батько в пеклі мучиться невіданням і помилково думає, що син мертвий." },
  { from:"d_06", to:"aen_vi_851", type:"THEMATIC",
    dF:"Данте натякає на зневагу Ґвідо Кавальканті до Вергілія (або до Беатріче, богослов'я). Мотив інтелектуальної гордості — зверхнього ставлення до традиції.",
    dT:"В Aeneis VI Анхіз визнає, що греки перевершають римлян у мистецтвах і науках, але римська місія — правити. Тема визнання чужої вищості в одній царині при перевазі в іншій." },
  { from:"d_07", to:"aen_vi_83", type:"STRUCTURE",
    dF:"Фарината пророкує Данте вигнання з Флоренції — «cinquanta volte fia raccesa» місяць, і він пізнає, як важко повертатися. Мертвий як пророк майбутнього горя — структурна модель пророчого діалогу.",
    dT:"В Aeneis VI Сивілла пророкує Енею випробування в Лаціумі: війни, ворогів, другий Ахіллес. Пророцтво страждань героєві, який щойно пережив catabasis, стає структурною моделлю для пророцтв у Дантовому пеклі." },
  { from:"d_08", to:"phars_vii_617", type:"THEMATIC",
    dF:"Фарината згадує битву при Монтаперті (1260), де гібелліни знищили ґвельфську Флоренцію. Данте-ґвельф називає це «стратою». Образ громадянської війни як найбільшої трагедії.",
    dT:"В Pharsalia VII Лукан описує наслідки битви при Фарсалі — поля, вкриті трупами римлян, убитих римлянами. Громадянська війна як найстрашніша подія — мотив, який Данте переносить на флорентійські розбрати." },
  { from:"d_09", to:"aen_xii_565", type:"THEMATIC",
    dF:"Фарината з гордістю згадує, що саме він «a viso aperto» захистив Флоренцію, коли інші гібелліни хотіли її зрівняти з землею після Монтаперті. Героїчний вчинок милосердя.",
    dT:"В Aeneis XII Еней щадить переможених латинян і пропонує мир замість знищення. Мотив великодушності переможця, що стримує помсту заради майбутнього миру." },
  { from:"d_10", to:"aen_vi_756", type:"INVERSION",
    dF:"Фарината пояснює парадокс: мертві бачать далеке майбутнє, як далекозорі, але не знають теперішнього. Після Страшного Суду, коли майбутнього не буде, їхнє знання згасне повністю.",
    dT:"В Aeneis VI Анхіз показує Енею процесію майбутніх римлян — від Ромула до Авґуста. Мертвий бачить майбутнє як привілей. У Данте це перевернуто: знання майбутнього — не привілей, а тортура, бо поєднане зі сліпотою до теперішнього." },
  { from:"d_11", to:"phars_ix_1", type:"ONOMASTIC",
    dF:"Фарината згадує, що поруч лежить «lo secondo Federico» — імператор Фрідріх II, відомий єретик-матеріаліст. Образ великого правителя, покараного за інтелектуальну зверхність.",
    dT:"На початку Pharsalia IX Лукан описує дух Помпея, що спостерігає за власним тілом після смерті. Мотив великого правителя, чий посмертний стан контрастує з прижиттєвою славою." },
];

const NODES_RAW = {
  d_01:    { label:"X, 11\u201315",   sub:"Epicuro e suoi seguaci",  author:"Данте",    col:0 },
  d_02:    { label:"X, 22\u201327",   sub:"Фарината підводиться",    author:"Данте",    col:0 },
  d_03:    { label:"X, 32\u201333",   sub:"inferno a gran dispitto", author:"Данте",    col:0 },
  d_04:    { label:"X, 22\u201351",   sub:"Фарината — велич",       author:"Данте",    col:0 },
  d_05:    { label:"X, 52\u201372",   sub:"Кавальканте — батько",    author:"Данте",    col:0 },
  d_06:    { label:"X, 58\u201360",   sub:"disdegno Ґвідо",          author:"Данте",    col:0 },
  d_07:    { label:"X, 73\u201378",   sub:"пророцтво вигнання",      author:"Данте",    col:0 },
  d_08:    { label:"X, 79\u201381",   sub:"Монтаперті",              author:"Данте",    col:0 },
  d_09:    { label:"X, 85\u201387",   sub:"Фарината рятує Флоренцію",author:"Данте",   col:0 },
  d_10:    { label:"X, 97\u2013108",  sub:"мертві бачать майбутнє",  author:"Данте",    col:0 },
  d_11:    { label:"X, 119\u2013120", sub:"Фрідріх II",              author:"Данте",    col:0 },
  aen_vi_735:  { label:"Aen. VI, 735\u2013742",sub:"космологія душ",     author:"Вергілій", col:1 },
  aen_vi_679:  { label:"Aen. VI, 679\u2013702",sub:"Анхіз і Еней",       author:"Вергілій", col:1 },
  aen_vi_851:  { label:"Aen. VI, 851\u2013853",sub:"tu regere imperio",   author:"Вергілій", col:1 },
  aen_vi_83:   { label:"Aen. VI, 83\u201397",  sub:"Сивілла пророкує",   author:"Вергілій", col:1 },
  aen_vi_756:  { label:"Aen. VI, 756\u2013886",sub:"процесія римлян",    author:"Вергілій", col:1 },
  aen_ii_547:  { label:"Aen. II, 547\u2013558",sub:"смерть Пріама",      author:"Вергілій", col:1 },
  aen_xii_565: { label:"Aen. XII, 565\u2013573",sub:"Еней щадить",       author:"Вергілій", col:1 },
  phars_vi_750:{ label:"Phars. VI, 750\u2013770",sub:"мрець встає",       author:"Лукан",    col:1 },
  phars_i_128: { label:"Phars. I, 128\u2013135",sub:"Цезар — hybris",    author:"Лукан",    col:1 },
  phars_vii_617:{ label:"Phars. VII, 617\u2013646",sub:"поле Фарсалу",   author:"Лукан",    col:1 },
  phars_ix_1:  { label:"Phars. IX, 1\u201318",  sub:"дух Помпея",        author:"Лукан",    col:1 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_10';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
