<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"met_iii_259_315", type:"ALLUSION",
    dF:"Данте відкриває пісню розгорнутим порівнянням із двома класичними прикладами безумства: Атамант, доведений Юноною до шаленства, хапає дружину Іно з дітьми, вважаючи їх левицею з левенятами.",
    dT:"В Metamorphoses III Юнона мстить дому Кадма через Семелу: підмовляє її попросити Юпітера з\'явитися у повній божественній славі, від чого Семела згоряє. Початок ланцюга помсти, що веде до безумства Атаманта." },
  { from:"d_01", to:"met_iv_512_530", type:"ALLUSION",
    dF:"Данте відкриває пісню розгорнутим порівнянням із двома класичними прикладами безумства: Атамант, доведений Юноною до шаленства, хапає дружину Іно з дітьми, вважаючи їх левицею з левенятами.",
    dT:"В Metamorphoses IV Атамант, обезумівший від фурії Тісіфони, насланої Юноною, хапає сина Леарха і розбиває його об скелю. Іно кидається в море з другим сином. Кульмінація Юнониної помсти дому Кадма." },
  { from:"d_02", to:"met_xiii_404_575", type:"ALLUSION",
    dF:"Друге порівняння — Гекуба, «trista, misera e cattiva», що побачила мертву Поліксену, а потім знайшла тіло Полідора на березі й загавкала від горя, втративши розум.",
    dT:"В Metamorphoses XIII Овідій описує останні нещастя Гекуби: жертвоприношення Поліксени на могилі Ахілла та виявлення тіла Полідора, вбитого Полімнестором. Гекуба від горя перетворюється на собаку, гавкаючи від болю." },
  { from:"d_03", to:"aen_vii_341_405", type:"STRUCTURE",
    dF:"Данте використовує два класичних exempla (Атамант, Гекуба), щоб показати, що навіть найстрашніше язичницьке безумство не зрівняється з бісовською люттю тіней-фальсифікаторів. Структура: mythological exemplum → superatio.",
    dT:"В Aeneis VII фурія Аллекто насилає безумство на Амату, яка біжить по місту як менада, та на Турна. Вергіліанська модель надприродного безумства, насланого фурією, стає структурним зразком для Дантових «ombre furiose»." },
  { from:"d_04", to:"met_xi_266_345", type:"THEMATIC",
    dF:"Джанні Скіккі, який вдав із себе мертвого Буозо Донаті, щоб підробити заповіт, біжить по ровині як шалена тінь і кусає інших грішників. Тема обману через зміну особистості.",
    dT:"В Metamorphoses XI Автолік, внук Гермеса, славиться здатністю змінювати вигляд вкрадених речей — перетворюючи чорне на біле, рогате на безроге. Тема трикстера-перевертня, що змінює форму для здобичі." },
  { from:"d_05", to:"met_x_298_502", type:"ALLUSION",
    dF:"Данте називає другу шалену тінь — «l\'anima antica di Mirra scellerata» — Мірру, яка перевдягнулась і видала себе за іншу, щоб увійти до батькового ложа. Фальсифікація особистості заради інцесту.",
    dT:"В Metamorphoses X Овідій докладно описує історію Мірри, яка палає злочинною пристрастю до батька Кінира. За допомогою годувальниці вона потрапляє до батькового ложа переодягнутою, доки той не впізнає її і не жене з мечем. Мірру перетворено на дерево мірри." },
  { from:"d_06", to:"met_viii_788_842", type:"THEMATIC",
    dF:"Маестро Адамо, роздутий водянкою, вічно мучиться спрагою, мріючи про холодні струмки Казентіно. Його тіло деформоване як лютня — покарання контрапасо за спотворення монет.",
    dT:"В Metamorphoses VIII Ерісіхтон, покараний Церерою, страждає від ненаситного голоду, що роздуває його тіло. Мотив тілесної деформації як божественної кари за порушення сакрального порядку — тематична паралель із водянкою Адамо." },
  { from:"d_07", to:"aen_ii_57_198", type:"ALLUSION",
    dF:"Данте називає лихоманочну тінь поряд із Маестро Адамо — «il falso Sinon greco di Troia». Прямо вказує на Вергіліїв текст, називаючи Синона «хибним греком із Трої».",
    dT:"В Aeneis II Синон — грецький шпигун, що добровільно здався троянцям і зворушливою брехливою промовою переконав їх втягнути дерев\'яного коня в місто. Класичний архетип брехуна, що руйнує місто словом." },
  { from:"d_08", to:"ilias_latina_1_50", type:"INVERSION",
    dF:"Маестро Адамо і Синон обмінюються ударами й ображають один одного — вульгарна сварка двох покараних брехунів. Данте слухає із ганебною цікавістю, доки Вергілій не дорікає йому.",
    dT:"Ilias Latina (I ст. н.е.) — скорочений латинський переказ Іліади. Перші 50 рядків переповідають сварку Ахілла й Аґамемнона через Брісеїду — саме через цей текст Данте знав зміст гомерівського конфлікту." },
  { from:"ilias_latina_1_50", to:"il_i_101_244", type:"INVERSION",
    dF:"В Ilias I сварка Ахілла та Аґамемнона через Брісеїду — конфлікт героїв, який відкриває весь епос. Данте інвертує модель: замість героїчного конфлікту — ганебна бійка двох грішників, замість клеосу — ницість.",
    dT:"В Ilias I сварка Ахілла та Аґамемнона через Брісеїду — конфлікт героїв, який відкриває весь епос. Данте інвертує модель: замість героїчного конфлікту — ганебна бійка двох грішників, замість клеосу — ницість." },
  { from:"d_09", to:"aen_vi_537_539", type:"STRUCTURE",
    dF:"Вергілій різко дорікає Данте за те, що той заслухався ганебної сварки: «Or pur mira, / che per poco che teco non mi risso!» — «Ще трохи, і я посварюсь із тобою!» Провідник утримує пілігрима від моральної деградації.",
    dT:"В Aeneis VI Сивілла утримує Енея від затримки перед видовищами підземного світу. Структурна модель: провідник як моральний авторитет, що не дозволяє герою піддатися спокусі споглядання зла." },
];

const NODES_RAW = {
  "d_01": { label:"XXX, 1-12", sub:"Семела та Атамант", author:"Данте", col:0 },
  "met_iii_259_315": { label:"Met. III, 259\u2013315", sub:"загибель Семели від Юнони", author:"Овідій", col:1 },
  "met_iv_512_530": { label:"Met. IV, 512\u2013530", sub:"Атамант убиває сина", author:"Овідій", col:1 },
  "d_02": { label:"XXX, 13-21", sub:"Гекуба — троянський жаль", author:"Данте", col:0 },
  "met_xiii_404_575": { label:"Met. XIII, 404-575", sub:"Hecuba — загибель Поліксени та Полі", author:"Овідій", col:1 },
  "d_03": { label:"XXX, 1-27", sub:"exempla furiae", author:"Данте", col:0 },
  "aen_vii_341_405": { label:"Aen. VII, 341-405", sub:"Аллекто та безумство Амати", author:"Вергілій", col:1 },
  "d_04": { label:"XXX, 37-41", sub:"Джанні Скіккі — самозванство", author:"Данте", col:0 },
  "met_xi_266_345": { label:"Met. XI, 266-345", sub:"Автолік — хитрий злодій", author:"Овідій", col:1 },
  "d_05": { label:"XXX, 38", sub:"Мірра — incestum", author:"Данте", col:0 },
  "met_x_298_502": { label:"Met. X, 298-502", sub:"Myrrha — кохання до батька", author:"Овідій", col:1 },
  "d_06": { label:"XXX, 49-57", sub:"maestro Adamo — фальсифікатор монет", author:"Данте", col:0 },
  "met_viii_788_842": { label:"Met. VIII, 788-842", sub:"Ерісіхтон — ненаситний голод", author:"Овідій", col:1 },
  "d_07": { label:"XXX, 97-99", sub:"Синон Грецький", author:"Данте", col:0 },
  "aen_ii_57_198": { label:"Aen. II, 57-198", sub:"Sinon — зрадник перед троянцями", author:"Вергілій", col:1 },
  "d_08": { label:"XXX, 100-129", sub:"сварка Адамо і Синона", author:"Данте", col:0 },
  "il_i_101_244": { label:"Il. I, 101-244", sub:"сварка Ахілла та Аґамемнона", author:"Гомер", col:2 },
  "ilias_latina_1_50": { label:"Ilias Latina, 1-50", sub:"латинський переказ", author:"Ilias Latina", col:1 },
  "d_09": { label:"XXX, 130-132", sub:"Вергілій дорікає Данте", author:"Данте", col:0 },
  "aen_vi_537_539": { label:"Aen. VI, 537-539", sub:"Сивілла утримує Енея", author:"Вергілій", col:1 },
};

const AUTHOR_STYLES = {
  "Ilias Latina": {f:"#28200e",s:"#ceb45a"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Гомер": {f:"#28140e",s:"#ce7a5a"},
  "Данте": {f:"#281a08",s:"#d4a853"},
  "Овідій": {f:"#280e1a",s:"#ce5a8a"},
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);const defs=svg.append("defs");Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});const nCols=colX.length;const cw=svgW/nCols;colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});
function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path").attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to])).attr("fill","none").attr("stroke",d=>TC[d.type]).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6).attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none").attr("opacity",.5).attr("marker-end",d=>"url(#a-"+d.type+")");
const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g").attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")").style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5).attr("fill",d=>AS[d.author]?.f||"#1a1a1a").attr("stroke",d=>AS[d.author]?.s||"#333").attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text').trim()).attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500).text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text-muted').trim()).attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic").text(d=>d.sub);
ne.filter(d=>d.col>0).append("text").attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle").attr("fill",d=>AS[d.author]?.s||"#555").attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7).text(d=>d.author);
ne.on("mouseover",function(ev,d){const ids=new Set([d.id]);LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04).attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});nodeG.selectAll("g").select("rect").attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";return'<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>'}).join("<br><br>");
if(parts)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+parts).style("opacity",1).style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")
}).on("mousemove",function(ev){tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")}).on("mouseout",function(){linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);nodeG.selectAll("g").select("rect").attr("opacity",1);tooltip.style("opacity",0)});
function togglePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}});
(function buildNav(){var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};var pad2=function(n){return String(n).padStart(2,'0')};var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];var cur='inf_30';var container=document.getElementById('panelContent');ct.forEach(function(c){var sec=document.createElement('div');sec.className='side-panel-section';var h3=document.createElement('h3');h3.textContent=c.t;sec.appendChild(h3);for(var i=1;i<=c.c;i++){var f=c.x+'_'+pad2(i);var a=document.createElement('a');a.href=f+'.html';a.textContent=c.a+' '+roman(i);if(f===cur)a.className='current';sec.appendChild(a)}container.appendChild(sec)})})(  );
</script>
