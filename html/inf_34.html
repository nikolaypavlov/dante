<!DOCTYPE html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="../dante-theme.css">
</head>
<body>
<div class="side-panel-overlay" id="overlay" onclick="togglePanel()"></div>
<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="inf_33.html">← Inf. XXXIII</a>
    <div class="title-block"><h1>Inferno XXXIV</h1><p>Інтертекстуальне дерево джерел</p></div>
    <a class="nav-arrow" href="purg_01.html">Purg. I →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"vexilla", type:"INVERSION",
    dF:"Вергілій оголошує: «Vexilla Regis prodeunt Inferni» — «Наближаються прапори пекельного Царя». Данте бере літургійний гімн Хресної п'ятниці й додає «Inferni», перевертаючи хресну символіку на пекельну.",
    dT:"Венанцій Фортунат (VI ст.) написав гімн «Vexilla Regis prodeunt» для зустрічі реліквії Хреста Господнього. Гімн оспівує Хрест як прапор перемоги Христа. Данте інвертує: «прапори» Люцифера — його крила — пародія на Хрест." },
  { from:"d_02", to:"is_14", type:"ALLUSION",
    dF:"Данте описує Люцифера як «lo 'mperador del doloroso regno» — імператора царства болю, вмерзлого по груди в крижане озеро. Його велич — карикатура на колишню красу.",
    dT:"В Isaias 14 пророк описує падіння Люцифера: «Quomodo cecidisti de caelo, Lucifer, fili aurorae!» — «Як упав ти з неба, Люцифере, сину зорі!» Найкрасивіший ангел став найницішим створінням. Данте реалізує цей образ тілесно." },
  { from:"d_03", to:"apoc_4", type:"INVERSION",
    dF:"Люцифер має три обличчя на одній голові — червоне, жовтувато-біле й чорне. Три обличчя — пародія на Святу Трійцю: замість мудрості, сили й любові — ненависть, безсилля й невігластво.",
    dT:"В Apocalypsis 4 чотири живі істоти оточують престол Божий і співають «Sanctus, sanctus, sanctus». Тринітарна символіка потрійного повторення перегукується з потрійною структурою Люцифера як інфернальної пародії на Трійцю." },
  { from:"d_04", to:"aen_vi_282", type:"THEMATIC",
    dF:"Під кожним обличчям — два величезних крила, більших за вітрила корабля, «non avean penne, ma di vispistrello» — не пір'їні, а кажанячі. Їхній змах заморожує Коціт.",
    dT:"В Aeneis VI при вході до Аїду стоять персоніфікації жаху: Сон, Смерть, крилаті чудовиська. Мотив потворних крил у підземному світі — протилежність ангельських крил — тематична паралель до кажанячих крил Люцифера." },
  { from:"d_05", to:"matt_26", type:"ALLUSION",
    dF:"Люцифер жує трьох зрадників: в центральній (найстрашнішій) пащі — Юда Іскаріот, якому «il capo dentro e fuor le gambe» — голова всередині, ноги назовні. Юда — найбільший зрадник в історії.",
    dT:"Євангеліє від Матвія описує зраду Юди: він продає Христа за тридцять срібняків і видає його поцілунком у Гетсиманському саду. Юда — архетип зрадника Бога, найтяжчий гріх у Дантовій ієрархії." },
  { from:"d_06", to:"phars_vii_586", type:"ALLUSION",
    dF:"У двох бічних пащах Люцифера — Брут і Кассій, вбивці Юлія Цезаря. Брут висить без слова, Кассій виглядає «membruto» — кремезним. Зрадники імперії симетрично відповідають зраднику Бога.",
    dT:"В Pharsalia VII Лукан описує Брута і Кассія як борців за республіку проти Цезаря. Для Данте, навпаки, вони — зрадники divinamente встановленої імперії, і їхнє покарання дорівнює покаранню Юди." },
  { from:"d_07", to:"aen_vi_893", type:"STRUCTURE",
    dF:"Вергілій несе Данте на плечах, чіпляючись за шерсть Люцифера, і в точці центру Землі перевертається — починають іти ногами вгору. Фізичний перехід через тіло зла як вихід з пекла.",
    dT:"В Aeneis VI Еней виходить з Аїду через ворота зі слонової кістки (porta eburnea). Структурна модель виходу з підземного світу, але Данте трансформує її: замість воріт — тіло самого Сатани, через яке потрібно фізично пройти." },
  { from:"d_08", to:"is_14b", type:"STRUCTURE",
    dF:"Вергілій пояснює космологію: коли Люцифер упав з неба, земля з жахом відступила і утворила порожнину пекла в Північній півкулі, а витіснена маса створила гору Чистилища на Півдні.",
    dT:"Біблійний мотив падіння Люцифера (Is. 14:12) Данте перетворює на космогонічний міт: падіння ангела — акт, що фізично сформував географію потойбіччя. Структурне запозичення: біблійна подія стає причиною Дантової космології." },
  { from:"d_09", to:"aen_vi_126", type:"INVERSION",
    dF:"Данте і Вергілій піднімаються вузьким підземним ходом (natural burella) — важким шляхом, протилежним до легкого спуску. «Per quella via nascosta» — таємна стежка назовні.",
    dT:"В Aeneis VI Сивілла каже: «facilis descensus Averno... sed revocare gradum» — спуститися легко, але повернутися — ось де труднощі. Данте буквально реалізує цю вергіліанську максиму: підйом з пекла — фізично тяжкий шлях." },
  { from:"d_10", to:"aen_vi_898", type:"STRUCTURE",
    dF:"Останній рядок Inferno: «E quindi uscimmo a riveder le stelle» — «І звідти ми вийшли, щоб знову побачити зорі». Зорі як символ надії й божественного порядку після темряви пекла.",
    dT:"В Aeneis VI Еней виходить з підземного світу і повертається до світла: «aspirant aurae in noctem» — вітри дихають у ніч. Структурна модель повернення з catabasis до поверхні, де герой бачить небо. Данте робить цей момент фінальним акордом усієї кантики." },
];

const NODES_RAW = {
  d_01:    { label:"XXXIV, 1",           sub:"Vexilla Regis Inferni",   author:"Данте",    col:0 },
  d_02:    { label:"XXXIV, 18\u201327",  sub:"emperador doloroso",      author:"Данте",    col:0 },
  d_03:    { label:"XXXIV, 28\u201336",  sub:"три обличчя",             author:"Данте",    col:0 },
  d_04:    { label:"XXXIV, 37\u201345",  sub:"крила кажана",            author:"Данте",    col:0 },
  d_05:    { label:"XXXIV, 55\u201367",  sub:"Юда Іскаріот",            author:"Данте",    col:0 },
  d_06:    { label:"XXXIV, 64\u201367",  sub:"Брут і Кассій",           author:"Данте",    col:0 },
  d_07:    { label:"XXXIV, 70\u201384",  sub:"перехід через Люцифера",  author:"Данте",    col:0 },
  d_08:    { label:"XXXIV, 112\u2013115",sub:"падіння — cosmogonia",    author:"Данте",    col:0 },
  d_09:    { label:"XXXIV, 127\u2013132",sub:"natural burella",         author:"Данте",    col:0 },
  d_10:    { label:"XXXIV, 139",         sub:"riveder le stelle",       author:"Данте",    col:0 },
  vexilla:      { label:"Venantius Fort.",        sub:"Vexilla Regis",         author:"Венанцій Фортунат", col:1 },
  is_14:        { label:"Is. 14:12\u201315",      sub:"cecidisti Lucifer",     author:"Біблія",   col:1 },
  apoc_4:       { label:"Apoc. 4:8",             sub:"Sanctus, sanctus",      author:"Біблія",   col:1 },
  aen_vi_282:   { label:"Aen. VI, 282\u2013284", sub:"крилаті чудовиська",    author:"Вергілій", col:1 },
  matt_26:      { label:"Matt. 26:14\u201350",   sub:"зрада Юди",             author:"Біблія",   col:1 },
  phars_vii_586:{ label:"Phars. VII, 586\u2013596",sub:"Брут і Кассій",       author:"Лукан",    col:1 },
  aen_vi_893:   { label:"Aen. VI, 893\u2013898", sub:"porta eburnea",         author:"Вергілій", col:1 },
  is_14b:       { label:"Is. 14:12",             sub:"падіння ангела",         author:"Біблія",   col:1 },
  aen_vi_126:   { label:"Aen. VI, 126\u2013131", sub:"facilis descensus",     author:"Вергілій", col:1 },
  aen_vi_898:   { label:"Aen. VI, 898\u2013901", sub:"вихід на поверхню",     author:"Вергілій", col:1 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"},
  "Венанцій Фортунат": {f:"#1e0e28",s:"#b85ace"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_34';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
