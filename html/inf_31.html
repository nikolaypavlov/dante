<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inf. XXXI — Інтертекстуальне дерево</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="../dante-theme.css">
</head>
<body>
<div class="side-panel-overlay" id="overlay" onclick="togglePanel()"></div>
<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="inf_30.html">← Inf. XXX</a>
    <div class="title-block"><h1>Inferno XXXI</h1><p>Інтертекстуальне дерево джерел</p></div>
    <a class="nav-arrow" href="inf_32.html">Inf. XXXII →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"d_01", to:"met_xii_112", type:"ALLUSION",
    dF:"Данте порівнює докір Вергілія (що ранить, а потім зціляє) зі списом Ахілла і його батька Пелея: «Cos\u00ec od'io che solea far la lancia / d'Achille e del suo padre» — спис, що ранив і сам же зціляв.",
    dT:"В Metamorphoses Овідій згадує спис Пелея (Pelias hasta), який мав магічну властивість: рана від нього могла бути зціленою лише повторним дотиком того самого списа. Телеф, поранений Ахіллом, міг зцілитися лише іржею з його списа." },
  { from:"d_02", to:"roland_176", type:"ALLUSION",
    dF:"Данте чує страшний звук рогу, що переважає навіть грім. Він порівнює його з рогом Роланда: «Dopo la dolorosa rotta, quando / Carlo Magno perd\u00e9 la santa gesta, / non son\u00f2 s\u00ec terribilmente Orlando».",
    dT:"В Chanson de Roland Роланд тричі сурмить в Olifant під час битви в Ронсевальській ущелині, кличучи Карла Великого на допомогу, доки не лопається скроня від напруження. Наймогутніший звук рогу в середньовічній літературі." },
  { from:"d_03", to:"aen_vi_549", type:"STRUCTURE",
    dF:"Данте бачить силуети, що здаються вежами, як Монтереджоне з його баштами. Поступове розкриття масштабу — спершу нечіткі форми, потім усвідомлення, що це гіганти.",
    dT:"В Aeneis VI Еней бачить стіни Тартару — потрійну мурівку, оточену вогненною рікою Флегетон. Монументальна архітектура потойбічної в'язниці як межа між рівнями підземного світу." },
  { from:"d_04", to:"aen_vi_580", type:"ALLUSION",
    dF:"Данте бачить гігантів, що стоять навколо колодязя, занурені по пояс — закуті в кам'яну раму. Вергілій називає їх і пояснює, що Юпітер ще лякається, коли вони ворушаться.",
    dT:"В Aeneis VI Вергілій описує покараних Тітіїв в Тартарі: «Hic genus antiquum Terrae, Titania pubes, / fulmine deiecti fundo volvuntur in imo» — давній рід Землі, повалені блискавкою, лежать на дні." },
  { from:"d_05", to:"gen_11", type:"ALLUSION",
    dF:"Немврод вигукує незрозумілі слова — «Raph\u00e8l ma\u00ec am\u00e8cche zab\u00ec almi» — і Вергілій пояснює, що це той, з чийого злого задуму світ утратив єдину мову. Немврод не розуміє інших і його не розуміють.",
    dT:"В Genesis 11 люди будують вежу до неба у Вавілоні; Бог змішує їхні мови, щоб вони перестали розуміти одне одного, і розсіює їх по землі. Середньовічна традиція ідентифікувала Немврода (Gen. 10:8-10) як будівника вежі." },
  { from:"d_06", to:"gen_10", type:"ONOMASTIC",
    dF:"Вергілій ідентифікує гіганта як Немврода і називає його мисливський ріг, що висить на грудях. Данте поєднує біблійний образ Немврода-мисливця з мітом про гігантів-бунтівників.",
    dT:"В Genesis 10 Немврод — «robustus venator coram Domino», могутній мисливець перед Господом, засновник Вавілону. Образ Немврода як гіганта-бунтівника розвинувся в середньовічній екзегезі." },
  { from:"d_07", to:"met_i_151", type:"ALLUSION",
    dF:"Данте бачить Ефіальта, закутого в ланцюги — гіганта, який разом із братом Отом намагався вгромадити гори, щоб штурмувати Олімп. Вергілій каже: «Quando i giganti fer paura a' d\u00e8i».",
    dT:"В Metamorphoses I Овідій описує гігантів, що вгромаджують Пеліон на Оссу, щоб дістатись Олімпу. Юпітер повалює їх блискавкою. Класичний сюжет гігантомахії — бунту проти божественного порядку." },
  { from:"d_08", to:"phars_iv_593", type:"ALLUSION",
    dF:"Вергілій звертається до Антея, єдиного незакутого гіганта, і просить його опустити мандрівників на дно Коціту. Згадує його подвиги — тисячу левів у долині Баграді — і перемогу Геркулеса.",
    dT:"В Pharsalia IV Лукан описує двобій Геркулеса з Антеєм біля Заме: Антей, син Землі, відновлював сили при кожному дотику до матері-землі. Геркулес підняв його і задушив у повітрі. Найдокладніший античний опис цього поєдинку." },
  { from:"d_09", to:"phars_iv_586", type:"ALLUSION",
    dF:"Вергілій натякає Антеєві, що якби він допоміг гігантам у бунті проти Олімпу, вони б перемогли. Згадує землю поблизу Зами, де Сципіон переміг Ганнібала, як батьківщину Антея.",
    dT:"Лукан локалізує Антея біля Зами та річки Багради в Лівії. Він підкреслює, що Антей жив саме там, де пізніше Сципіон переміг Ганнібала — зв'язок між міфом та історією, який Данте відтворює." },
  { from:"d_10", to:"aen_iii_677", type:"THEMATIC",
    dF:"Коли Антей нахиляється, щоб опустити мандрівників, Данте порівнює враження з тим, як виглядає вежа Гарізенда в Болоньї, коли стоїш під нею і хмара пливе над нею — здається, що вежа падає.",
    dT:"В Aeneis III Вергілій описує Енцелада, гіганта, заточеного під Етною: коли він ворушиться, земля тремтить і вулкан вивергає вогонь. Мотив гіганта, чий рух змінює ландшафт, — тематична паралель до враження від руху Антея." },
];

const NODES_RAW = {
  d_01:    { label:"XXXI, 4\u20136",    sub:"lancia d'Achille",        author:"Данте",    col:0 },
  d_02:    { label:"XXXI, 12\u201318",  sub:"ріг Немврода / Роланда",  author:"Данте",    col:0 },
  d_03:    { label:"XXXI, 40\u201345",  sub:"вежі Монтереджоне",       author:"Данте",    col:0 },
  d_04:    { label:"XXXI, 46\u201357",  sub:"гіганти у колодязі",      author:"Данте",    col:0 },
  d_05:    { label:"XXXI, 91\u201396",  sub:"Немврод — Вавілон",       author:"Данте",    col:0 },
  d_06:    { label:"XXXI, 94\u201396",  sub:"Немврод — мисливець",     author:"Данте",    col:0 },
  d_07:    { label:"XXXI, 98\u2013105", sub:"Ефіальт",                 author:"Данте",    col:0 },
  d_08:    { label:"XXXI, 115\u2013129",sub:"Антей — Геркулес",        author:"Данте",    col:0 },
  d_09:    { label:"XXXI, 119\u2013121",sub:"Антей — Зама",            author:"Данте",    col:0 },
  d_10:    { label:"XXXI, 136\u2013141",sub:"Гарізенда",               author:"Данте",    col:0 },
  met_xii_112:  { label:"Met. XII\u2013XIII",    sub:"Pelias hasta",          author:"Овідій",   col:1 },
  roland_176:   { label:"Roland, laisse 176",    sub:"Olifant",               author:"Chanson de Roland", col:1 },
  aen_vi_549:   { label:"Aen. VI, 549\u2013554", sub:"стіни Тартару",         author:"Вергілій", col:1 },
  aen_vi_580:   { label:"Aen. VI, 580\u2013584", sub:"Тітії та гіганти",      author:"Вергілій", col:1 },
  gen_11:       { label:"Gen. 11:1\u20139",       sub:"Вавілонська вежа",      author:"Біблія",   col:1 },
  gen_10:       { label:"Gen. 10:8\u201310",      sub:"Nimrod venator",        author:"Біблія",   col:1 },
  met_i_151:    { label:"Met. I, 151\u2013162",   sub:"гігантомахія",          author:"Овідій",   col:1 },
  phars_iv_593: { label:"Phars. IV, 593\u2013660",sub:"Антей і Геркулес",     author:"Лукан",    col:1 },
  phars_iv_586: { label:"Phars. IV, 586\u2013592",sub:"Зама і Баграда",       author:"Лукан",    col:1 },
  aen_iii_677:  { label:"Aen. III, 677\u2013681", sub:"Енцелад під Етною",    author:"Вергілій", col:1 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},
  "Лукан":    {f:"#0e2028",s:"#5abecc"},
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"},
  "Chanson de Roland": {f:"#1e1e0e",s:"#b8a85a"}
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));
const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
if(byCols[2]&&byCols[2].length){byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});rOY(byCols[2])}
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});
const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");
Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id","a-"+t).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});
const nCols=colX.length;const cw=svgW/nCols;
colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return"M"+sx+","+s.y+" C"+(sx+dx*.45)+","+s.y+" "+(tx-dx*.45)+","+t.y+" "+tx+","+t.y}
const linkG=svg.append("g");
const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to]))
  .attr("fill","none")
  .attr("stroke",d=>TC[d.type])
  .attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6)
  .attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none")
  .attr("opacity",.5)
  .attr("marker-end",d=>"url(#a-"+d.type+")");

const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform",d=>"translate("+(d.x-nodeW/2)+","+(d.y-nodeH/2)+")")
  .style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5)
  .attr("fill",d=>AS[d.author]?.f||"#1a1a1a")
  .attr("stroke",d=>AS[d.author]?.s||"#333")
  .attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text').trim())
  .attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500)
  .text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle")
  .attr("fill",st.getPropertyValue('--text-muted').trim())
  .attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic")
  .text(d=>d.sub);
ne.filter(d=>d.col>0).append("text")
  .attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle")
  .attr("fill",d=>AS[d.author]?.s||"#555")
  .attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7)
  .text(d=>d.author);

ne.on("mouseover",function(ev,d){
  const ids=new Set([d.id]);
  LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});
  linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04)
    .attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});
  nodeG.selectAll("g").select("rect")
    .attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
  var parts=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{
    var c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"\u2192":"\u2190";
    var s='<span class="tt-type" style="background:'+c+'22;color:'+c+';border:1px solid '+c+'44">'+TYPE_UA[l.type]+'</span> '+arr+' <strong>'+other.label+'</strong><br><span class="tt-desc">'+desc+'</span>';
    return s;
  });
  var h=parts.join("<br><br>");
  if(h)tooltip.html('<strong>'+d.label+'</strong> <em style="color:var(--text-muted)">\u00b7 '+d.author+'</em><br><br>'+h)
    .style("opacity",1)
    .style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mousemove",function(ev){
  tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top",Math.min(ev.clientY+14,innerHeight-300)+"px");
}).on("mouseout",function(){
  linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);
  nodeG.selectAll("g").select("rect").attr("opacity",1);
  tooltip.style("opacity",0);
});

function togglePanel(){
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

(function buildNav(){
  var roman=function(n){var v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'],r='';for(var i=0;i<v.length;i++)while(n>=v[i]){r+=s[i];n-=v[i]}return r};
  var pad2=function(n){return String(n).padStart(2,'0')};
  var ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];
  var cur='inf_31';
  var container=document.getElementById('panelContent');
  ct.forEach(function(c){
    var sec=document.createElement('div');
    sec.className='side-panel-section';
    var h3=document.createElement('h3');
    h3.textContent=c.t;
    sec.appendChild(h3);
    for(var i=1;i<=c.c;i++){
      var f=c.x+'_'+pad2(i);
      var a=document.createElement('a');
      a.href=f+'.html';
      a.textContent=c.a+' '+roman(i);
      if(f===cur)a.className='current';
      sec.appendChild(a);
    }
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
