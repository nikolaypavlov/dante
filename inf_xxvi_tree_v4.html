// ─── Layout (horizontal) ────────────────────────────────
const nodeW = 164, nodeH = 46, gapY = 8, gapX = 140;
const colLabelW = 0; // we put labels differently
const padLeft = 70, padTop = 20;

const nodes = Object.entries(NODES_RAW).map(([id, n]) => ({ id, ...n, x: 0, y: 0 }));
const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const byCols = [
  nodes.filter(n => n.col === 0), // Dante
  nodes.filter(n => n.col === 1), // Intermediaries
  nodes.filter(n => n.col === 2), // Ancient
];

// Step 1: Dante column — fixed top-to-bottom
byCols[0].forEach((n, i) => { n.y = i * (nodeH + gapY) + nodeH / 2; });

// Step 2: Intermediaries — avg Y of their Dante parents
byCols[1].forEach(n => {
  const parents = LINKS_DATA.filter(l => l.to === n.id && nodeMap[l.from]?.col === 0)
    .map(l => nodeMap[l.from]);
  if (parents.length) n.y = parents.reduce((s, p) => s + p.y, 0) / parents.length;
  else n.y = byCols[0][Math.floor(byCols[0].length / 2)].y;
});
resolveOverlapsY(byCols[1]);

// Step 3: Ancient — avg Y of their intermediary parents
byCols[2].forEach(n => {
  const parents = LINKS_DATA.filter(l => l.to === n.id && nodeMap[l.from])
    .map(l => nodeMap[l.from]);
  if (parents.length) n.y = parents.reduce((s, p) => s + p.y, 0) / parents.length;
  else n.y = byCols[1][Math.floor(byCols[1].length / 2)].y;
});
resolveOverlapsY(byCols[2]);

function resolveOverlapsY(arr) {
  arr.sort((a, b) => a.y - b.y);
  const min = nodeH + gapY;
  for (let p = 0; p < 40; p++) {
    let ok = true;
    for (let i = 1; i < arr.length; i++) {
      const d = arr[i].y - arr[i-1].y;
      if (d < min) {
        const s = (min - d) / 2 + 0.5;
        arr[i-1].y -= s; arr[i].y += s;
        ok = false;
      }
    }
    if (ok) break;
  }
}

// X positions per column
const colX = [
  padLeft + nodeW / 2,
  padLeft + nodeW + gapX + nodeW / 2,
  padLeft + 2 * (nodeW + gapX) + nodeW / 2,
];
nodes.forEach(n => { n.x = colX[n.col]; });

// Normalize Y so min is at padTop
const minY = Math.min(...nodes.map(n => n.y)) - nodeH / 2;
nodes.forEach(n => n.y -= minY - padTop);

const svgW = padLeft + 3 * nodeW + 2 * gapX + padLeft;
const svgH = Math.max(...nodes.map(n => n.y + nodeH / 2)) + 20;

// ─── Colors ─────────────────────────────────────────────
const TC = {
  ALLUSION: "#d4a853", STRUCTURE: "#7ea88e", THEMATIC: "#8a7eb8",
  INVERSION: "#c45c5c", ONOMASTIC: "#5c8ab8"
};
const AS = {
  "Данте":    { f: "#281a08", s: "#d4a853" },
  "Вергілій": { f: "#1a0e28", s: "#a06ece" },
  "Овідій":   { f: "#280e1a", s: "#ce5a8a" },
  "Стацій":   { f: "#0e1428", s: "#5a78ce" },
  "Сенека":   { f: "#0e2028", s: "#5abecc" },
  "Гомер":    { f: "#28140e", s: "#ce7a5a" },
  "Біблія":   { f: "#280e0e", s: "#ce5a5a" }
};

// ─── SVG ────────────────────────────────────────────────
const svg = d3.select("#chart-container").append("svg")
  .attr("width", svgW).attr("height", svgH);

const defs = svg.append("defs");
Object.entries(TC).forEach(([t, c]) => {
  defs.append("marker").attr("id", `a-${t}`)
    .attr("viewBox", "0 0 10 6").attr("refX", 10).attr("refY", 3)
    .attr("markerWidth", 7).attr("markerHeight", 5).attr("orient", "auto")
    .append("path").attr("d", "M0,0.5 L9,3 L0,5.5Z").attr("fill", c);
});

// Alternating column backgrounds — equal width strips
const style = getComputedStyle(document.documentElement);
const nCols = colX.length;
const cw = svgW / nCols;
colX.forEach((cx, i) => {
  svg.append("rect")
    .attr("x", i * cw).attr("y", 0)
    .attr("width", cw).attr("height", svgH)
    .attr("fill", i % 2 === 0
      ? style.getPropertyValue('--col-dark').trim()
      : style.getPropertyValue('--col-light').trim());
});

// ─── Links (horizontal curves) ──────────────────────────
function hCurve(s, t) {
  const sx = s.x + nodeW / 2 + 2;
  const tx = t.x - nodeW / 2 - 2;
  const dx = tx - sx;
  return `M${sx},${s.y} C${sx + dx * 0.45},${s.y} ${tx - dx * 0.45},${t.y} ${tx},${t.y}`;
}

const linkG = svg.append("g");
const linkEls = linkG.selectAll("path").data(LINKS_DATA).enter().append("path")
  .attr("d", d => hCurve(nodeMap[d.from], nodeMap[d.to]))
  .attr("fill", "none")
  .attr("stroke", d => TC[d.type])
  .attr("stroke-width", d => d.type === "STRUCTURE" ? 3 : 1.6)
  .attr("stroke-dasharray", d => d.type === "THEMATIC" ? "6,4" : d.type === "ONOMASTIC" ? "2,4" : "none")
  .attr("opacity", 0.5)
  .attr("marker-end", d => `url(#a-${d.type})`);

// ─── Nodes ──────────────────────────────────────────────
const tooltip = d3.select("#tooltip");
const nodeG = svg.append("g");

const ne = nodeG.selectAll("g").data(nodes).enter().append("g")
  .attr("transform", d => `translate(${d.x - nodeW/2},${d.y - nodeH/2})`)
  .style("cursor", "pointer");

ne.append("rect").attr("width", nodeW).attr("height", nodeH).attr("rx", 5)
  .attr("fill", d => AS[d.author]?.f || "#1a1a1a")
  .attr("stroke", d => AS[d.author]?.s || "#333")
  .attr("stroke-width", d => d.author === "Данте" ? 1.8 : 1);

ne.append("text").attr("x", nodeW/2).attr("y", 17).attr("text-anchor", "middle")
  .attr("fill", style.getPropertyValue('--text').trim()).attr("font-size", "10px")
  .attr("font-family", "'JetBrains Mono', monospace").attr("font-weight", 500)
  .text(d => d.label);

ne.append("text").attr("x", nodeW/2).attr("y", 32).attr("text-anchor", "middle")
  .attr("fill", style.getPropertyValue('--text-muted').trim()).attr("font-size", "10.5px")
  .attr("font-family", "'Cormorant Garamond', serif").attr("font-style", "italic")
  .text(d => d.sub);

// Author tag on intermediary & ancient nodes
ne.filter(d => d.col > 0).append("text")
  .attr("x", nodeW / 2).attr("y", nodeH - 2).attr("text-anchor", "middle")
  .attr("fill", d => AS[d.author]?.s || "#555")
  .attr("font-size", "7px").attr("font-family", "'JetBrains Mono', monospace")
  .attr("opacity", 0.7).text(d => d.author);

// ─── Hover ──────────────────────────────────────────────
ne.on("mouseover", function(ev, d) {
  const ids = new Set([d.id]);
  LINKS_DATA.forEach(l => {
    if (l.from === d.id || l.to === d.id) { ids.add(l.from); ids.add(l.to); }
  });

  linkEls.attr("opacity", l => (l.from === d.id || l.to === d.id) ? 1 : 0.04)
    .attr("stroke-width", l => {
      const on = l.from === d.id || l.to === d.id;
      return on ? (l.type === "STRUCTURE" ? 4.5 : 3) : (l.type === "STRUCTURE" ? 3 : 1.6);
    });

  nodeG.selectAll("g").select("rect")
    .attr("opacity", function() { return ids.has(d3.select(this.parentNode).datum().id) ? 1 : 0.1; });

  const html = LINKS_DATA
    .filter(l => l.from === d.id || l.to === d.id)
    .map(l => {
      const c = TC[l.type];
      const isFrom = l.from === d.id;
      const other = isFrom ? nodeMap[l.to] : nodeMap[l.from];
      const desc = isFrom ? l.dF : l.dT;
      const arrow = isFrom ? "→" : "←";
      return `<span class="tt-type" style="background:${c}22;color:${c};border:1px solid ${c}44">${TYPE_UA[l.type]}</span> ${arrow} <strong>${other.label}</strong><br><span class="tt-desc">${desc}</span>`;
    }).join("<br><br>");

  if (html) tooltip
    .html(`<strong>${d.label}</strong> <em style="color:#8a7e6e">· ${d.author}</em><br><br>${html}`)
    .style("opacity", 1)
    .style("left", Math.min(ev.clientX + 14, innerWidth - 440) + "px")
    .style("top", Math.min(ev.clientY + 14, innerHeight - 300) + "px");
})
.on("mousemove", function(ev) {
  tooltip.style("left", Math.min(ev.clientX+14,innerWidth-440)+"px")
    .style("top", Math.min(ev.clientY+14,innerHeight-300)+"px");
})
.on("mouseout", function() {
  linkEls.attr("opacity", 0.5)
    .attr("stroke-width", d => d.type === "STRUCTURE" ? 3 : 1.6);
  nodeG.selectAll("g").select("rect").attr("opacity", 1);
  tooltip.style("opacity", 0);
});

// ─── Side Panel Navigation ─────────────────────────────
function togglePanel() {
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }
});

// Generate canto list
(function buildNav() {
  const roman = (n) => {
    const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
    const syms = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
    let r = '';
    for (let i = 0; i < vals.length; i++) {
      while (n >= vals[i]) { r += syms[i]; n -= vals[i]; }
    }
    return r;
  };

  const pad2 = n => String(n).padStart(2, '0');

  const canticae = [
    { title: 'Inferno',    abbr: 'Inf.', prefix: 'inf', count: 34 },
    { title: 'Purgatorio', abbr: 'Purg.', prefix: 'purg', count: 33 },
    { title: 'Paradiso',   abbr: 'Par.', prefix: 'par', count: 33 },
  ];

  const currentFile = 'inf_26'; // would be dynamic in production

  const container = document.getElementById('panelContent');
  let html = '';

  canticae.forEach(c => {
    html += `<div class="side-panel-section"><h3>${c.title}</h3>`;
    for (let i = 1; i <= c.count; i++) {
      const file = `${c.prefix}_${pad2(i)}`;
      const isCurrent = file === currentFile;
      const cls = isCurrent ? ' class="current"' : '';
      html += `<a href="${file}.html"${cls}>${c.abbr} ${roman(i)}</a>`;
    }
    html += '</div>';
  });

  container.innerHTML = html;
})();
</script>
