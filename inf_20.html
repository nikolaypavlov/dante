<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inf. XX — Інтертекстуальне дерево</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="dante-theme.css">
</head>
<body>
<div class="side-panel-overlay" id="overlay" onclick="togglePanel()"></div>
<div class="side-panel" id="sidePanel"><div class="side-panel-header"><h2>Навігація</h2><button class="side-panel-close" onclick="togglePanel()">✕</button></div><div id="panelContent"></div></div>

<header>
  <button class="nav-btn" onclick="togglePanel()" title="Навігація">☰</button>
  <div class="header-center">
    <a class="nav-arrow" href="inf_19.html">← Inf. XIX</a>
    <div class="title-block"><h1>Inferno XX</h1><p>Інтертекстуальне дерево джерел — віщуни</p></div>
    <a class="nav-arrow" href="inf_21.html">Inf. XXI →</a>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#d4a853"></div>Алюзія</div>
  <div class="legend-item"><div class="legend-swatch thick" style="background:#7ea88e"></div>Структура</div>
  <div class="legend-item"><div class="legend-swatch dashed" style="border-color:#8a7eb8"></div>Тематика</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c45c5c"></div>Інверсія</div>
  <div class="legend-item"><div class="legend-swatch dotted" style="border-color:#5c8ab8"></div>Ономастика</div>
</div>
<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const TYPE_UA = { ALLUSION:"Алюзія", STRUCTURE:"Структура", THEMATIC:"Тематика", INVERSION:"Інверсія", ONOMASTIC:"Ономастика" };

const LINKS_DATA = [
  { from:"inf_31", to:"theb_iv", type:"ALLUSION",
    dF:"Данте називає Амфіарая, що провалився під землю під Фівами — прямо за Стацієм.",
    dT:"У четвертій книзі Thebais Стацій описує, як земля розверзлася під колісницею провісника Амфіарая під час облоги Фів." },
  { from:"inf_40", to:"met_iii", type:"ALLUSION",
    dF:"Данте описує Тіресія, чиє тіло змінилося, коли він вдарив двох зміїв палицею.",
    dT:"У третій книзі Metamorphoses Овідій розповідає, як Тіресій був перетворений на жінку після удару по зміях, а через сім років — назад." },
  { from:"inf_46", to:"od_x_490", type:"THEMATIC",
    dF:"Згадка Тіресія як провісника резонує з його роллю в Одіссеї, хоча Данте знає це через латинську традицію.",
    dT:"У десятій–одинадцятій книзі Odyssea Тіресій — ключовий провісник, до якого Одіссей спускається в Аїд. Його пророча функція стає архетиповою." },
  { from:"inf_52", to:"aen_x", type:"ALLUSION",
    dF:"Данте згадує Арунта, етруського гаруспіка з гір Луні.",
    dT:"У десятій книзі Aeneis Вергілій згадує Арунта серед етруських вождів. Лукан у Pharsalia I дає детальніший портрет — Данте поєднує обидва джерела." },
  { from:"inf_52", to:"phars_i", type:"ALLUSION",
    dF:"Деталі про Арунта — печера в мармурових горах, вигляд зірок — походять від Лукана.",
    dT:"У першій книзі Pharsalia Лукан описує етруського гаруспіка Арунта, що живе в покинутій Луні серед мармурових скель і читає знаки з неба та нутрощів." },
  { from:"inf_55", to:"aen_vi_445", type:"INVERSION",
    dF:"Манто блукає по світу після падіння Фів — інверсія сходження героя до мети. Вергілій-персонаж переповідає її історію інакше, ніж Вергілій-автор.",
    dT:"В Aeneis VI Вергілій поміщає Манто серед тіней Аїду. Данте ж дає їй іншу біографію через Вергілія-персонажа, створюючи метанаративну гру." },
  { from:"inf_55", to:"theb_iv_m", type:"ALLUSION",
    dF:"Основне джерело про Манто — Стацій: вона дочка Тіресія, пророчиця Фів.",
    dT:"У Thebais Стацій описує Манто як дочку Тіресія, що допомагає батькові в некромантичних обрядах під час облоги Фів." },
  { from:"inf_91", to:"aen_x_198", type:"STRUCTURE",
    dF:"Вергілій розповідає історію заснування Мантуї у 40 рядках — мініатюрний етіологічний міф, побудований за моделлю вергіліанських етіологій.",
    dT:"В Aeneis X Вергілій коротко описує заснування Мантуї як міста Манто. Данте розгортає цей натяк у повноцінну наративну вставку." },
  { from:"inf_113", to:"aen_iii", type:"ALLUSION",
    dF:"Данте згадує Еврипіла як грецького ворожбита при Авліді — посилаючись на версію Вергілія.",
    dT:"У третій книзі Aeneis Еврипіл згадується як той, кого греки посилали до оракула Аполлона. Вергілій подає його як авґура." },
  { from:"inf_onom", to:"theb_passim", type:"ONOMASTIC",
    dF:"Фіванський цикл імен — Амфіарай, Тіресій, Манто — приходить до Данте через Стація як основного латинського посередника.",
    dT:"Thebais Стація — головне латинське джерело фіванського міфологічного циклу. Імена пророків і їхні ролі транслюються через цю поему до Данте." },
  // Chains
  { from:"theb_iv", to:"il_xxiii", type:"ALLUSION",
    dF:"Стацій будує свого Амфіарая на натяках із традиції, що включає гомерівські Фіви.",
    dT:"Іліада згадує семеро проти Фів у контексті поколінь героїв. Амфіарай входить у цю традицію як один з учасників походу." },
  { from:"met_iii", to:"od_x_490", type:"ALLUSION",
    dF:"Овідій розгортає міф про Тіресія, відомий з гомерівської традиції, додаючи деталі метаморфози.",
    dT:"Odyssea встановлює Тіресія як сліпого провісника. Овідій пояснює причину сліпоти та дар пророцтва через конфлікт з Юноною." },
];

const NODES_RAW = {
  inf_31:    { label:"XX, 31–36",    sub:"Амфіарай",           author:"Данте",    col:0 },
  inf_40:    { label:"XX, 40–45",    sub:"Тіресій",            author:"Данте",    col:0 },
  inf_46:    { label:"XX, 46",       sub:"Тіресій-провісник",  author:"Данте",    col:0 },
  inf_52:    { label:"XX, 46–51",    sub:"Арунт",              author:"Данте",    col:0 },
  inf_55:    { label:"XX, 52–99",    sub:"Манто / Мантуя",     author:"Данте",    col:0 },
  inf_91:    { label:"XX, 91–93",    sub:"заснування Мантуї",  author:"Данте",    col:0 },
  inf_113:   { label:"XX, 106–111",  sub:"Еврипіл",            author:"Данте",    col:0 },
  inf_onom:  { label:"XX, passim",   sub:"фіванські імена",    author:"Данте",    col:0 },
  theb_iv:   { label:"Theb. IV",     sub:"провалля Амфіарая",  author:"Стацій",   col:1 },
  met_iii:   { label:"Met. III, 316–338", sub:"Тіресій",       author:"Овідій",   col:1 },
  aen_x:     { label:"Aen. X, 198–200",  sub:"Арунт / Мантуя",author:"Вергілій", col:1 },
  phars_i:   { label:"Phars. I, 584–638", sub:"Арунт",         author:"Лукан",    col:1 },
  aen_vi_445:{ label:"Aen. VI, 445",      sub:"Манто в Аїді",  author:"Вергілій", col:1 },
  theb_iv_m: { label:"Theb. IV, 463–499", sub:"Манто",         author:"Стацій",   col:1 },
  aen_x_198: { label:"Aen. X, 198–203",   sub:"заснування",    author:"Вергілій", col:1 },
  aen_iii:   { label:"Aen. III, 359",     sub:"Еврипіл",       author:"Вергілій", col:1 },
  theb_passim:{ label:"Theb. passim",     sub:"фіванський цикл",author:"Стацій",  col:1 },
  il_xxiii:  { label:"Il. XXIII, 346",   sub:"Фіванська традиція",author:"Гомер", col:2 },
  od_x_490:  { label:"Od. X–XI",         sub:"Тіресій-провісник",author:"Гомер",  col:2 },
};

const AUTHOR_STYLES = {
  "Данте":    {f:"#281a08",s:"#d4a853"},  // gold
  "Вергілій": {f:"#1a0e28",s:"#a06ece"},  // purple
  "Овідій":   {f:"#280e1a",s:"#ce5a8a"},  // magenta
  "Лукан":    {f:"#0e2028",s:"#5abecc"},  // cyan
  "Стацій":   {f:"#0e1428",s:"#5a78ce"},  // blue
  "Гомер":    {f:"#28140e",s:"#ce7a5a"},  // orange
  "Біблія":   {f:"#280e0e",s:"#ce5a5a"}   // red
};

const nodeW=164,nodeH=46,gapY=8,gapX=140,padLeft=70,padTop=20;
const nodes=Object.entries(NODES_RAW).map(([id,n])=>({id,...n,x:0,y:0}));const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
const byCols=[nodes.filter(n=>n.col===0),nodes.filter(n=>n.col===1),nodes.filter(n=>n.col===2)];
byCols[0].forEach((n,i)=>{n.y=i*(nodeH+gapY)+nodeH/2});
byCols[1].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]?.col===0).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else n.y=byCols[0][Math.floor(byCols[0].length/2)].y});
rOY(byCols[1]);
byCols[2].forEach(n=>{const p=LINKS_DATA.filter(l=>l.to===n.id&&nodeMap[l.from]).map(l=>nodeMap[l.from]);if(p.length)n.y=p.reduce((s,x)=>s+x.y,0)/p.length;else if(byCols[1].length)n.y=byCols[1][Math.floor(byCols[1].length/2)].y;else n.y=200});
rOY(byCols[2]);
function rOY(a){a.sort((a,b)=>a.y-b.y);const m=nodeH+gapY;for(let p=0;p<40;p++){let o=true;for(let i=1;i<a.length;i++){const d=a[i].y-a[i-1].y;if(d<m){const s=(m-d)/2+.5;a[i-1].y-=s;a[i].y+=s;o=false}}if(o)break}}
const maxC=Math.max(...nodes.map(n=>n.col)),colX=[];for(let c=0;c<=maxC;c++)colX.push(padLeft+c*(nodeW+gapX)+nodeW/2);
nodes.forEach(n=>{n.x=colX[n.col]});const minY=Math.min(...nodes.map(n=>n.y))-nodeH/2;nodes.forEach(n=>n.y-=minY-padTop);
const svgW=padLeft+(maxC+1)*nodeW+maxC*gapX+padLeft,svgH=Math.max(...nodes.map(n=>n.y+nodeH/2))+20;
const TC={ALLUSION:"#d4a853",STRUCTURE:"#7ea88e",THEMATIC:"#8a7eb8",INVERSION:"#c45c5c",ONOMASTIC:"#5c8ab8"};
const AS=AUTHOR_STYLES;const st=getComputedStyle(document.documentElement);
const svg=d3.select("#chart-container").append("svg").attr("width",svgW).attr("height",svgH);
const defs=svg.append("defs");Object.entries(TC).forEach(([t,c])=>{defs.append("marker").attr("id",`a-${t}`).attr("viewBox","0 0 10 6").attr("refX",10).attr("refY",3).attr("markerWidth",7).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,0.5 L9,3 L0,5.5Z").attr("fill",c)});const nCols=colX.length;const cw=svgW/nCols;colX.forEach((cx,i)=>{svg.append("rect").attr("x",i*cw).attr("y",0).attr("width",cw).attr("height",svgH).attr("fill",i%2===0?st.getPropertyValue("--col-dark").trim():st.getPropertyValue("--col-light").trim())});

function hC(s,t){const sx=s.x+nodeW/2+2,tx=t.x-nodeW/2-2,dx=tx-sx;return`M${sx},${s.y} C${sx+dx*.45},${s.y} ${tx-dx*.45},${t.y} ${tx},${t.y}`}
const linkG=svg.append("g");const linkEls=linkG.selectAll("path").data(LINKS_DATA).enter().append("path").attr("d",d=>hC(nodeMap[d.from],nodeMap[d.to])).attr("fill","none").attr("stroke",d=>TC[d.type]).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6).attr("stroke-dasharray",d=>d.type==="THEMATIC"?"6,4":d.type==="ONOMASTIC"?"2,4":"none").attr("opacity",.5).attr("marker-end",d=>`url(#a-${d.type})`);
const tooltip=d3.select("#tooltip");const nodeG=svg.append("g");
const ne=nodeG.selectAll("g").data(nodes).enter().append("g").attr("transform",d=>`translate(${d.x-nodeW/2},${d.y-nodeH/2})`).style("cursor","pointer");
ne.append("rect").attr("width",nodeW).attr("height",nodeH).attr("rx",5).attr("fill",d=>AS[d.author]?.f||"#1a1a1a").attr("stroke",d=>AS[d.author]?.s||"#333").attr("stroke-width",d=>d.author==="Данте"?1.8:1);
ne.append("text").attr("x",nodeW/2).attr("y",17).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text').trim()).attr("font-size","10px").attr("font-family","'JetBrains Mono',monospace").attr("font-weight",500).text(d=>d.label);
ne.append("text").attr("x",nodeW/2).attr("y",32).attr("text-anchor","middle").attr("fill",st.getPropertyValue('--text-muted').trim()).attr("font-size","10.5px").attr("font-family","'Cormorant Garamond',serif").attr("font-style","italic").text(d=>d.sub);
ne.filter(d=>d.col>0).append("text").attr("x",nodeW/2).attr("y",nodeH-2).attr("text-anchor","middle").attr("fill",d=>AS[d.author]?.s||"#555").attr("font-size","7px").attr("font-family","'JetBrains Mono',monospace").attr("opacity",.7).text(d=>d.author);
ne.on("mouseover",function(ev,d){const ids=new Set([d.id]);LINKS_DATA.forEach(l=>{if(l.from===d.id||l.to===d.id){ids.add(l.from);ids.add(l.to)}});linkEls.attr("opacity",l=>(l.from===d.id||l.to===d.id)?1:.04).attr("stroke-width",l=>{const on=l.from===d.id||l.to===d.id;return on?(l.type==="STRUCTURE"?4.5:3):(l.type==="STRUCTURE"?3:1.6)});nodeG.selectAll("g").select("rect").attr("opacity",function(){return ids.has(d3.select(this.parentNode).datum().id)?1:.1});
const html=LINKS_DATA.filter(l=>l.from===d.id||l.to===d.id).map(l=>{const c=TC[l.type],isF=l.from===d.id,other=isF?nodeMap[l.to]:nodeMap[l.from],desc=isF?l.dF:l.dT,arr=isF?"→":"←";return`<span class="tt-type" style="background:${c}22;color:${c};border:1px solid ${c}44">${TYPE_UA[l.type]}</span> ${arr} <strong>${other.label}</strong><br><span class="tt-desc">${desc}</span>`}).join("<br><br>");
if(html)tooltip.html(`<strong>${d.label}</strong> <em style="color:var(--text-muted)">· ${d.author}</em><br><br>${html}`).style("opacity",1).style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")
}).on("mousemove",function(ev){tooltip.style("left",Math.min(ev.clientX+14,innerWidth-440)+"px").style("top",Math.min(ev.clientY+14,innerHeight-300)+"px")}).on("mouseout",function(){linkEls.attr("opacity",.5).attr("stroke-width",d=>d.type==="STRUCTURE"?3:1.6);nodeG.selectAll("g").select("rect").attr("opacity",1);tooltip.style("opacity",0)});
function togglePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('sidePanel').classList.remove('open');document.getElementById('overlay').classList.remove('open')}});
(function(){const r=n=>{const v=[1000,900,500,400,100,90,50,40,10,9,5,4,1],s=['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];let o='';for(let i=0;i<v.length;i++)while(n>=v[i]){o+=s[i];n-=v[i]}return o};const p=n=>String(n).padStart(2,'0');const ct=[{t:'Inferno',a:'Inf.',x:'inf',c:34},{t:'Purgatorio',a:'Purg.',x:'purg',c:33},{t:'Paradiso',a:'Par.',x:'par',c:33}];const cur='inf_20';let h='';ct.forEach(c=>{h+=`<div class="side-panel-section"><h3>${c.t}</h3>`;for(let i=1;i<=c.c;i++){const f=`${c.x}_${p(i)}`;h+=`<a href="${f}.html"${f===cur?' class="current"':''}>${c.a} ${r(i)}</a>`}h+='</div>'});document.getElementById('panelContent').innerHTML=h})();
</script>
</body>
</html>
